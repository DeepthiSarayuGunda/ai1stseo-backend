<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - AI1stSEO</title>
<meta name="description" content="Get in touch with the AI 1st SEO team. Questions about SEO audits, AI citation tracking, or site monitoring? We're here to help.">
<style>
:root{--bg:#0a0a0a;--surface:#111;--border:rgba(255,255,255,0.06);--text:#f0f0f0;--muted:rgba(255,255,255,0.55);--faint:rgba(255,255,255,0.3);--accent:#00d4ff;--accent2:#7b2cbf}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:1px solid var(--border)}
.logo{font-size:1.1rem;font-weight:700;background:linear-gradient(90deg,#00d4ff,#7b2cbf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.nav-back{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .2s}
.nav-back:hover{color:var(--text)}
.page{max-width:560px;margin:60px auto;padding:0 24px}
h1{font-size:1.8rem;font-weight:700;margin-bottom:6px}
.sub{color:var(--muted);font-size:.95rem;margin-bottom:32px}
.form-group{margin-bottom:20px}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
input,textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px 14px;font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:130px;resize:vertical}
button{width:100%;padding:14px;border:none;border-radius:8px;background:linear-gradient(90deg,#00d4ff,#7b2cbf);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:4px}
button:hover{opacity:.9}
button:disabled{opacity:.4;cursor:not-allowed}
.msg{text-align:center;margin-top:14px;font-size:.88rem;min-height:1.2em}
.msg.ok{color:#22c55e}.msg.err{color:#ef4444}
.info{text-align:center;margin-top:32px;font-size:.82rem;color:var(--faint);line-height:1.8}
.info a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<nav>
<a href="https://www.ai1stseo.com" class="logo">&#x1F50D; AI1stSEO</a>
<a href="https://www.ai1stseo.com" class="nav-back">&larr; Back to home</a>
</nav>
<div class="page">
<h1>Contact Us</h1>
<p class="sub">Questions, feedback, or partnership inquiries</p>
<form id="contactForm" onsubmit="sendForm(event)">
<div class="form-group"><label>Name</label><input type="text" id="name" required placeholder="Your name"></div>
<div class="form-group"><label>Email</label><input type="email" id="email" required placeholder="you@company.com"></div>
<div class="form-group"><label>Message</label><textarea id="message" required placeholder="How can we help?"></textarea></div>
<button type="submit" id="btn">Send Message</button>
</form>
<div class="msg" id="msg"></div>
<div class="info">
<p>Or email us directly: <a href="mailto:support@ai1stseo.com">support@ai1stseo.com</a></p>
<p>AI1stSEO &middot; Ottawa, Canada</p>
</div>
</div>
<script>
async function sendForm(e){
  e.preventDefault();
  var btn=document.getElementById('btn'),msg=document.getElementById('msg');
  btn.disabled=true;btn.textContent='Sending...';msg.className='msg';msg.textContent='';
  try{
    var r=await fetch('https://api.ai1stseo.com/api/contact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:document.getElementById('name').value,email:document.getElementById('email').value,message:document.getElementById('message').value})});
    var d=await r.json();
    if(d.status==='success'){msg.className='msg ok';msg.textContent='Message sent! We\'ll get back to you soon.';document.getElementById('contactForm').reset();}
    else{msg.className='msg err';msg.textContent=d.message||'Failed to send.';}
  }catch(err){msg.className='msg err';msg.textContent='Connection error. Try emailing support@ai1stseo.com';}
  btn.disabled=false;btn.textContent='Send Message';
}
</script>
</body>
</html>
