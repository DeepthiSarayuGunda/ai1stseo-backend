    <script>
      // Intercept ALL navigation to /audit/ and force full page reload with all categories
      (function() {
        // Intercept history.pushState
        const originalPushState = history.pushState;
        history.pushState = function(state, title, url) {
          if (url && url.includes('/audit/')) {
            const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
            let newUrl = url;
            if (url.includes('?cats=')) {
              newUrl = url.replace(/\?cats=[^&]*/, '?cats=' + allCats);
            } else if (url.includes('?')) {
              newUrl = url + '&cats=' + allCats;
            } else {
              newUrl = url + '?cats=' + allCats;
            }
            window.location.href = newUrl;
            return;
          }
          return originalPushState.apply(this, arguments);
        };

        // Intercept history.replaceState
        const originalReplaceState = history.replaceState;
        history.replaceState = function(state, title, url) {
          if (url && url.includes('/audit/')) {
            const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
            let newUrl = url;
            if (url.includes('?cats=')) {
              newUrl = url.replace(/\?cats=[^&]*/, '?cats=' + allCats);
            } else if (url.includes('?')) {
              newUrl = url + '&cats=' + allCats;
            } else {
              newUrl = url + '?cats=' + allCats;
            }
            window.location.href = newUrl;
            return;
          }
          return originalReplaceState.apply(this, arguments);
        };

        // Intercept clicks on links
        document.addEventListener('click', function(e) {
          const target = e.target.closest('a, button');
          if (target) {
            const href = target.getAttribute('href') || target.getAttribute('data-href') || '';
            if (href.includes('/audit/')) {
              e.preventDefault();
              e.stopPropagation();
              const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
              let newUrl = href;
              if (href.includes('?cats=')) {
                newUrl = href.replace(/\?cats=[^&]*/, '?cats=' + allCats);
              } else if (href.includes('?')) {
                newUrl = href + '&cats=' + allCats;
              } else {
                newUrl = href + '?cats=' + allCats;
              }
              window.location.href = newUrl;
            }
          }
        }, true);
      })();
    </script>

    <script>
      // Inject "Tools" dropdown into the React nav bar
      (function() {
        let injected = false;
        function injectToolsNav() {
          if (injected) return;
          // Find the nav - look for the nav element or header with nav links
          const nav = document.querySelector('nav') || document.querySelector('header');
          if (!nav) return;

          const buttons = nav.querySelectorAll('button, a');
          let loginBtn = null;
          buttons.forEach(function(btn) {
            const t = btn.textContent.trim().toUpperCase();
            if (t === 'LOGIN' || t === 'SIGN UP' || t.length <= 12) {
              if (!loginBtn && btn.getBoundingClientRect().right > window.innerWidth * 0.5) {
                loginBtn = btn;
              }
            }
          });
          // Find the container that holds nav links
          const navLinks = nav.querySelectorAll('a[href]');
          if (navLinks.length < 2) return;

          if (document.getElementById('tools-dropdown-wrap')) { injected = true; return; }

          btn.onclick = function(e) { e.stopPropagation(); dd.style.display = dd.style.display === 'none' ? 'block' : 'none'; };
          document.addEventListener('click', function() { dd.style.display = 'none'; });
          wrap.appendChild(btn);
          wrap.appendChild(dd);
          // Insert before the login button or at the end of nav
          if (loginBtn && loginBtn.parentElement) {
            loginBtn.parentElement.insertBefore(wrap, loginBtn);
          } else {
            // Find the flex container in the nav and append
            const flexContainers = nav.querySelectorAll('div');
            let target = nav;
            flexContainers.forEach(function(d) {
              const s = window.getComputedStyle(d);
              if (s.display === 'flex' && d.children.length >= 2) target = d;
            });
            target.appendChild(wrap);
          }
          injected = true;
        }
        setInterval(injectToolsNav, 500);
        injectToolsNav();
      })();
