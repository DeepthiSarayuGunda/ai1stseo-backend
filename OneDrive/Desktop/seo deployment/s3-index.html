<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AISEO Master - AI-First SEO Platform</title>
    <script type="module" crossorigin src="/assets/index-Bfah4_p8.js"></script>
    <script>
      // Intercept ALL navigation to /audit/ and force full page reload with all categories
      (function() {
        // Intercept history.pushState
        const originalPushState = history.pushState;
        history.pushState = function(state, title, url) {
          if (url && url.includes('/audit/')) {
            const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
            let newUrl = url;
            if (url.includes('?cats=')) {
              newUrl = url.replace(/\?cats=[^&]*/, '?cats=' + allCats);
            } else if (url.includes('?')) {
              newUrl = url + '&cats=' + allCats;
            } else {
              newUrl = url + '?cats=' + allCats;
            }
            window.location.href = newUrl;
            return;
          }
          return originalPushState.apply(this, arguments);
        };

        // Intercept history.replaceState
        const originalReplaceState = history.replaceState;
        history.replaceState = function(state, title, url) {
          if (url && url.includes('/audit/')) {
            const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
            let newUrl = url;
            if (url.includes('?cats=')) {
              newUrl = url.replace(/\?cats=[^&]*/, '?cats=' + allCats);
            } else if (url.includes('?')) {
              newUrl = url + '&cats=' + allCats;
            } else {
              newUrl = url + '?cats=' + allCats;
            }
            window.location.href = newUrl;
            return;
          }
          return originalReplaceState.apply(this, arguments);
        };

        // Intercept clicks on links
        document.addEventListener('click', function(e) {
          const target = e.target.closest('a, button');
          if (target) {
            const href = target.getAttribute('href') || target.getAttribute('data-href') || '';
            if (href.includes('/audit/')) {
              e.preventDefault();
              e.stopPropagation();
              const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
              let newUrl = href;
              if (href.includes('?cats=')) {
                newUrl = href.replace(/\?cats=[^&]*/, '?cats=' + allCats);
              } else if (href.includes('?')) {
                newUrl = href + '&cats=' + allCats;
              } else {
                newUrl = href + '?cats=' + allCats;
              }
              window.location.href = newUrl;
            }
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Inject "Tools" dropdown into the React nav bar
      (function() {
        let injected = false;
        function injectToolsNav() {
          if (injected) return;
          if (document.getElementById('tools-dropdown-wrap')) { injected = true; return; }
          
          // Find nav links containing known text
          const allLinks = document.querySelectorAll('a');
          let navContainer = null;
          for (let i = 0; i < allLinks.length; i++) {
            const text = allLinks[i].textContent.trim().toUpperCase();
            if (text === 'HOME' || text === 'INSIGHTS' || text === 'RESOURCES' || text === 'DASHBOARD') {
              navContainer = allLinks[i].parentElement;
              break;
            }
          }
          if (!navContainer) return;

          // Create the Tools dropdown
          const wrap = document.createElement('div');
          wrap.id = 'tools-dropdown-wrap';
          wrap.style.cssText = 'position:relative;display:inline-flex;align-items:center;margin-left:8px;';
          
          const btn = document.createElement('button');
          btn.textContent = 'TOOLS \u25BE';
          btn.style.cssText = 'background:none;border:none;cursor:pointer;font-family:inherit;font-size:0.875rem;color:#fff;padding:8px 12px;letter-spacing:0.05em;text-transform:uppercase;transition:opacity .2s;font-weight:500;';
          btn.onmouseover = function() { btn.style.opacity = '0.7'; };
          btn.onmouseout = function() { btn.style.opacity = '1'; };
          
          const dd = document.createElement('div');
          dd.style.cssText = 'display:none;position:absolute;top:100%;right:0;background:rgba(20,25,40,.98);border:1px solid rgba(0,212,255,.3);border-radius:8px;min-width:200px;padding:6px 0;z-index:10000;box-shadow:0 8px 24px rgba(0,0,0,.4);backdrop-filter:blur(10px);margin-top:4px;';
          
          var items = [
            {icon:'📊', label:'Website Monitoring', url:'https://monitor.ai1stseo.com'},
            {icon:'🔍', label:'SEO Audit', url:'https://seoaudit.ai1stseo.com'},
            {icon:'📈', label:'SEO Analysis', url:'https://seoanalysis.ai1stseo.com'},
            {icon:'📄', label:'Doc Summarizer', url:'https://docsummarizer.ai1stseo.com'},
            {icon:'⚙️', label:'Automation Hub', url:'https://automationhub.ai1stseo.com'}
          ];
          
          items.forEach(function(item) {
            var a = document.createElement('a');
            a.href = item.url;
            a.textContent = item.icon + ' ' + item.label;
            a.style.cssText = 'display:block;padding:10px 16px;color:#fff;text-decoration:none;font-size:0.85rem;transition:background .2s;';
            a.onmouseover = function() { a.style.background = 'rgba(0,212,255,.1)'; };
            a.onmouseout = function() { a.style.background = 'transparent'; };
            dd.appendChild(a);
          });
          
          btn.onclick = function(e) { e.stopPropagation(); dd.style.display = dd.style.display === 'none' ? 'block' : 'none'; };
          document.addEventListener('click', function() { dd.style.display = 'none'; });
          
          wrap.appendChild(btn);
          wrap.appendChild(dd);
          
          // Insert into the nav container - before LOGIN button if found, otherwise append
          var loginBtn = null;
          var children = navContainer.querySelectorAll('a, button');
          children.forEach(function(el) {
            if (el.textContent.trim().toUpperCase() === 'LOGIN') loginBtn = el;
          });
          
          if (loginBtn) {
            loginBtn.parentElement.insertBefore(wrap, loginBtn);
          } else {
            navContainer.appendChild(wrap);
          }
          
          injected = true;
        }
        // Keep trying until React renders the nav
        var attempts = 0;
        var interval = setInterval(function() {
          injectToolsNav();
          attempts++;
          if (injected || attempts > 60) clearInterval(interval);
        }, 500);
      })();
    </script>
  </body>
</html>
