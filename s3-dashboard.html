<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - AI1stSEO</title>
    <script type="module" crossorigin src="/assets/index-DHXIsnai.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-5EfaFiA8.css">
  </head>
  <body class="bg-[#0a0a0a] text-white min-h-screen">
    <div id="root"></div>

    <!-- Inject "AI Visibility Scanner" card into the AI Search Optimization grid -->
    <script>
      (function() {
        var injected = false;
        function tryInject() {
          if (injected) return;
          if (document.getElementById('ai-visibility-card')) { injected = true; return; }
          // Find "GEO Visibility Scanner" text to locate the card grid
          var allEls = document.querySelectorAll('*');
          var geoCard = null;
          for (var i = 0; i < allEls.length; i++) {
            var el = allEls[i];
            if (el.children.length === 0 && el.textContent.trim() === 'GEO Visibility Scanner') {
              geoCard = el; break;
            }
          }
          if (!geoCard) return;
          var cardEl = geoCard;
          for (var j = 0; j < 8; j++) {
            if (!cardEl.parentElement) break;
            cardEl = cardEl.parentElement;
            if (cardEl.children.length >= 3) {
              var grid = cardEl;
              injected = true;
              // Clone the style from an existing card
              var existingCard = grid.children[0];
              var card = document.createElement('div');
              card.id = 'ai-visibility-card';
              if (existingCard && existingCard.className) {
                card.className = existingCard.className;
              }
              card.style.cursor = 'pointer';
              card.onclick = function(){ window.location.href='/geo-scanner'; };
              card.innerHTML = '<div style="font-size:1.8rem;margin-bottom:8px">🔬</div>'
                + '<div style="font-size:1rem;font-weight:700;color:#e1e4e8;margin-bottom:4px">AI Visibility Scanner</div>'
                + '<div style="font-size:0.82rem;color:#8b949e;line-height:1.5;margin-bottom:12px">Full AI visibility scan — 4 scanner agents across AI models. Plain-English report with scores and recommendations.</div>'
                + '<span style="display:inline-block;padding:3px 10px;background:#238636;color:#fff;border-radius:6px;font-size:0.72rem;font-weight:600">NEW</span>';
              grid.appendChild(card);
              return;
            }
          }
        }
        var observer = new MutationObserver(tryInject);
        observer.observe(document.body, { childList: true, subtree: true });
        var interval = setInterval(function() { tryInject(); if (injected) clearInterval(interval); }, 500);
        setTimeout(function(){ observer.disconnect(); clearInterval(interval); }, 30000);
      })();
    </script>

    <script>
      // Remove personalized greeting for public site
      var hideGreeting = setInterval(function() {
        var allH1 = document.querySelectorAll('h1, h2, [class*="text-3xl"], [class*="text-4xl"]');
        for (var i = 0; i < allH1.length; i++) {
          var txt = allH1[i].textContent.trim();
          if (txt.match(/^Good (morning|afternoon|evening)/i)) {
            allH1[i].textContent = 'AI-First SEO Dashboard';
            clearInterval(hideGreeting);
            return;
          }
        }
      }, 300);
      setTimeout(function(){ clearInterval(hideGreeting); }, 15000);
    </script>
  </body>
</html>
