<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - AI1stSEO</title>
    <script type="module" crossorigin src="/assets/index-DHXIsnai.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-5EfaFiA8.css">
  </head>
  <body class="bg-[#0a0a0a] text-white min-h-screen">
    <div id="root"></div>

    <!-- GEO Scanner Agent — inject card into React dashboard grid -->
    <script>
      (function() {
        var injected = false;
        function tryInject() {
          if (injected) return;
          if (document.getElementById('geo-scanner-card')) { injected = true; return; }
          // Find "GEO Visibility Scanner" text to locate the card grid
          var allEls = document.querySelectorAll('*');
          var geoCard = null;
          for (var i = 0; i < allEls.length; i++) {
            var el = allEls[i];
            if (el.children.length === 0 && el.textContent.trim() === 'GEO Visibility Scanner') {
              geoCard = el; break;
            }
          }
          if (!geoCard) return;
          var cardEl = geoCard;
          for (var j = 0; j < 8; j++) {
            if (!cardEl.parentElement) break;
            cardEl = cardEl.parentElement;
            if (cardEl.children.length >= 3) {
              var grid = cardEl;
              injected = true;
              var card = document.createElement('div');
              card.id = 'geo-scanner-card';
              card.style.cssText = 'background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);border:2px solid #238636;border-radius:16px;padding:24px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;min-height:160px;';
              card.onmouseover = function(){ card.style.borderColor='#3fb950'; card.style.transform='translateY(-2px)'; card.style.boxShadow='0 4px 20px rgba(35,134,54,0.3)'; };
              card.onmouseout = function(){ card.style.borderColor='#238636'; card.style.transform='none'; card.style.boxShadow='none'; };
              card.onclick = function(){ window.location.href='/geo-scanner'; };
              card.innerHTML = '<div style="font-size:1.8rem;margin-bottom:8px">🔬</div>'
                + '<div style="font-size:1rem;font-weight:700;color:#e1e4e8;margin-bottom:4px">AI Visibility Report</div>'
                + '<div style="font-size:0.82rem;color:#8b949e;line-height:1.5;margin-bottom:12px">Full AI visibility scan — runs 4 scanner agents across AI models. Plain-English report with scores and recommendations.</div>'
                + '<span style="display:inline-block;padding:3px 10px;background:#238636;color:#fff;border-radius:6px;font-size:0.72rem;font-weight:600">NEW</span>';
              grid.insertBefore(card, grid.firstChild);
              return;
            }
          }
        }
        var observer = new MutationObserver(tryInject);
        observer.observe(document.body, { childList: true, subtree: true });
        var interval = setInterval(function() { tryInject(); if (injected) clearInterval(interval); }, 500);
        setTimeout(function(){ observer.disconnect(); clearInterval(interval); }, 30000);
      })();
    </script>

    <!-- Fallback banner if card injection doesn't find the grid -->
    <div id="geo-agent-banner" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#0d1117,#161b22);border-top:2px solid #238636;padding:12px 24px;display:flex;align-items:center;justify-content:center;gap:14px;box-shadow:0 -4px 20px rgba(0,0,0,0.5)">
      <span style="background:#f0883e;color:#fff;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:700">NEW</span>
      <span style="color:#8b949e;font-size:.82rem">🔬 AI Visibility Report — Full AI visibility scan</span>
      <a href="/geo-scanner" style="display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:#238636;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:.85rem">Open GEO Scanner</a>
      <span onclick="this.parentElement.style.display='none'" style="color:#484f58;cursor:pointer;font-size:1.2rem;padding:4px 8px">&times;</span>
    </div>
    <script>
      // Hide banner if card was injected successfully
      var hideBanner = setInterval(function() {
        if (document.getElementById('geo-scanner-card')) {
          var banner = document.getElementById('geo-agent-banner');
          if (banner) banner.style.display = 'none';
          clearInterval(hideBanner);
        }
      }, 600);
      setTimeout(function(){ clearInterval(hideBanner); }, 35000);

      // Remove personalized greeting for public site
      var hideGreeting = setInterval(function() {
        var allH1 = document.querySelectorAll('h1, h2, [class*="text-3xl"], [class*="text-4xl"]');
        for (var i = 0; i < allH1.length; i++) {
          var txt = allH1[i].textContent.trim();
          if (txt.match(/^Good (morning|afternoon|evening)/i)) {
            allH1[i].textContent = 'AI-First SEO Dashboard';
            clearInterval(hideGreeting);
            return;
          }
        }
      }, 300);
      setTimeout(function(){ clearInterval(hideGreeting); }, 15000);
    </script>
  </body>
</html>
