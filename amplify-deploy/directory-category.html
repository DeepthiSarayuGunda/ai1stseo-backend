<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 10 Dentists in Ottawa — AI Business Directory</title>
<meta name="description" content="AI-ranked top 10 dentists in Ottawa with ratings, AI citation scores, and comparison data optimized for AI search engines.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#1a1040 40%,#0d1117 100%);min-height:100vh;color:#e2e8f0}
.container{max-width:1000px;margin:0 auto;padding:20px}
.header{text-align:center;padding:24px 20px 20px}
.header h1{font-size:2em;background:linear-gradient(135deg,#c084fc,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#94a3b8;font-size:.9em;margin-top:4px}
.nav-back{margin-top:10px}
.nav-back a{color:#818cf8;text-decoration:none;font-size:.85em;padding:4px 14px;border:1px solid rgba(129,140,248,.2);border-radius:16px}
.nav-back a:hover{background:rgba(129,140,248,.12)}
.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.filter-btn{padding:6px 16px;font-size:.85em;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;color:#94a3b8;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(129,140,248,.12);border-color:#818cf8;color:#a5b4fc}
.card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:12px;transition:all .25s;cursor:pointer}
.card:hover{border-color:rgba(129,140,248,.25);transform:translateY(-2px)}
.card-row{display:flex;align-items:center;gap:16px}
.rank{font-size:1.8em;font-weight:800;color:#818cf8;min-width:44px;text-align:center}
.biz-info{flex:1}
.biz-name{font-size:1.1em;font-weight:700;color:#e2e8f0}
.biz-sub{font-size:.82em;color:#94a3b8;margin-top:2px}
.biz-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:.72em;padding:2px 8px;border-radius:8px;background:rgba(129,140,248,.08);color:#a5b4fc;border:1px solid rgba(129,140,248,.15)}
.scores{display:flex;gap:12px;align-items:center;flex-shrink:0}
.score-pill{text-align:center;padding:8px 14px;border-radius:10px;min-width:60px}
.score-pill .val{font-size:1.2em;font-weight:800}
.score-pill .lbl{font-size:.65em;color:#94a3b8;margin-top:1px}
.score-green{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.15)}
.score-green .val{color:#34d399}
.score-blue{background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.15)}
.score-blue .val{color:#818cf8}
.score-yellow{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.15)}
.score-yellow .val{color:#fbbf24}
.section-label{font-size:.72em;text-transform:uppercase;letter-spacing:1.5px;color:#818cf8;font-weight:700;margin:20px 0 10px;padding-left:4px}
.footer{text-align:center;padding:30px 20px;margin-top:30px;border-top:1px solid rgba(255,255,255,.06)}
.footer .built-by{font-size:.82em;color:#64748b}.footer .built-by span{color:#a5b4fc;font-weight:600}
@media(max-width:768px){.header h1{font-size:1.5em}.card-row{flex-direction:column;text-align:center}.scores{justify-content:center}}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏆 Top 10 Dentists in Ottawa</h1>
        <p>AI-Ranked Business Directory — Updated Daily</p>
        <div class="nav-back">
            <a href="/index.html">🏠 Home</a>
            <a href="/directory-compare.html" style="margin-left:8px">⚖️ Compare</a>
        </div>
    </div>

    <div class="filters">
        <div class="filter-btn active" onclick="filterCategory('all')">All</div>
        <div class="filter-btn" onclick="filterCategory('general')">General</div>
        <div class="filter-btn" onclick="filterCategory('cosmetic')">Cosmetic</div>
        <div class="filter-btn" onclick="filterCategory('pediatric')">Pediatric</div>
        <div class="filter-btn" onclick="filterCategory('emergency')">Emergency</div>
    </div>

    <div class="section-label">Rankings</div>
    <div id="listings"></div>

    <div class="footer">
        <div class="built-by">Built by <span>AI 1st SEO</span> — AI Business Directory</div>
    </div>
</div>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "name": "Top 10 Dentists in Ottawa",
  "description": "AI-ranked list of the best dental clinics in Ottawa, Ontario based on reviews, AI citation scores, and service quality.",
  "numberOfItems": 10,
  "itemListElement": [
    {"@type": "ListItem","position": 1,"name": "Sample Dental Clinic","url": "https://ai1stseo.com/directory-listing.html"},
    {"@type": "ListItem","position": 2,"name": "Capital Dental Care"},
    {"@type": "ListItem","position": 3,"name": "Ottawa Smiles Dentistry"},
    {"@type": "ListItem","position": 4,"name": "Rideau Dental Centre"},
    {"@type": "ListItem","position": 5,"name": "Glebe Family Dental"},
    {"@type": "ListItem","position": 6,"name": "Kanata Dental Studio"},
    {"@type": "ListItem","position": 7,"name": "Orleans Dental Group"},
    {"@type": "ListItem","position": 8,"name": "Barrhaven Smiles"},
    {"@type": "ListItem","position": 9,"name": "Westboro Dental Clinic"},
    {"@type": "ListItem","position": 10,"name": "Nepean Family Dentistry"}
  ]
}
</script>
<script>
const businesses=[
  {rank:1,name:"Sample Dental Clinic",address:"123 Bank St",cats:["general","cosmetic","emergency"],rating:4.8,reviews:342,aiScore:92,freshness:94,link:"/directory-listing.html"},
  {rank:2,name:"Capital Dental Care",address:"456 Elgin St",cats:["general","cosmetic"],rating:4.5,reviews:218,aiScore:78,freshness:88,link:"#"},
  {rank:3,name:"Ottawa Smiles Dentistry",address:"789 Rideau St",cats:["general","emergency"],rating:4.3,reviews:187,aiScore:71,freshness:82,link:"#"},
  {rank:4,name:"Rideau Dental Centre",address:"321 Rideau St",cats:["general","pediatric"],rating:4.6,reviews:156,aiScore:68,freshness:79,link:"#"},
  {rank:5,name:"Glebe Family Dental",address:"55 Glebe Ave",cats:["general","pediatric"],rating:4.4,reviews:134,aiScore:65,freshness:85,link:"#"},
  {rank:6,name:"Kanata Dental Studio",address:"100 Kanata Ave",cats:["cosmetic"],rating:4.7,reviews:98,aiScore:61,freshness:76,link:"#"},
  {rank:7,name:"Orleans Dental Group",address:"200 Orleans Blvd",cats:["general","emergency"],rating:4.2,reviews:112,aiScore:58,freshness:72,link:"#"},
  {rank:8,name:"Barrhaven Smiles",address:"88 Barrhaven Dr",cats:["general","pediatric"],rating:4.1,reviews:89,aiScore:54,freshness:70,link:"#"},
  {rank:9,name:"Westboro Dental Clinic",address:"44 Richmond Rd",cats:["cosmetic","general"],rating:4.3,reviews:76,aiScore:51,freshness:68,link:"#"},
  {rank:10,name:"Nepean Family Dentistry",address:"12 Nepean St",cats:["general","pediatric","emergency"],rating:4.0,reviews:64,aiScore:47,freshness:65,link:"#"}
];
let currentFilter='all';
function filterCategory(cat){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>{b.classList.toggle('active',b.textContent.toLowerCase()===cat||(cat==='all'&&b.textContent==='All'))});
  renderListings();
}
function renderListings(){
  const el=document.getElementById('listings');
  const filtered=currentFilter==='all'?businesses:businesses.filter(b=>b.cats.includes(currentFilter));
  el.innerHTML=filtered.map((b,i)=>`
    <div class="card" onclick="if('${b.link}'!=='#')window.location='${b.link}'">
      <div class="card-row">
        <div class="rank">#${b.rank}</div>
        <div class="biz-info">
          <div class="biz-name">${b.name}</div>
          <div class="biz-sub">${b.address} — ${b.rating}★ (${b.reviews} reviews)</div>
          <div class="biz-tags">${b.cats.map(c=>`<span class="tag">${c}</span>`).join('')}</div>
        </div>
        <div class="scores">
          <div class="score-pill score-green"><div class="val">${b.aiScore}</div><div class="lbl">AI Score</div></div>
          <div class="score-pill score-blue"><div class="val">${b.freshness}</div><div class="lbl">Fresh</div></div>
        </div>
      </div>
    </div>`).join('');
}
renderListings();
</script>
</body>
</html>
