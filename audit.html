<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Audit Results - AISEO Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        .tools-tab { position: fixed; top: 16px; right: 16px; z-index: 10000; }
        .tools-tab-btn { background: rgba(20,25,40,0.95); border: 1px solid rgba(0,212,255,0.4); color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-family: inherit; font-weight: 500; transition: all 0.2s; backdrop-filter: blur(10px); }
        .tools-tab-btn:hover { background: rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.6); }
        .tools-dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: rgba(20,25,40,0.98); border: 1px solid rgba(0,212,255,0.3); border-radius: 10px; min-width: 210px; padding: 6px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.5); backdrop-filter: blur(12px); }
        .tools-dropdown.open { display: block; }
        .tools-dropdown a { display: block; padding: 10px 16px; color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.85rem; transition: background 0.15s; white-space: nowrap; }
        .tools-dropdown a:hover { background: rgba(0,212,255,0.1); color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .url-display {
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: inline-block;
            word-break: break-all;
            max-width: 600px;
        }
        .loading { text-align: center; padding: 60px; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label { color: rgba(255,255,255,0.7); font-size: 0.85rem; }
        
        /* Category Overview Grid */
        .category-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .category-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .category-card.active {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        .category-card .expand-icon {
            transition: transform 0.3s ease;
            display: inline-block;
            font-size: 0.8rem;
            margin-left: 6px;
            opacity: 0.6;
        }
        .category-card.active .expand-icon {
            transform: rotate(180deg);
        }
        .category-detail-wrapper {
            grid-column: 1 / -1;
            overflow: hidden;
            display: none;
        }
        .category-detail-wrapper.open {
            display: block;
        }
        .category-detail-inner {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 5px;
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        .category-detail-inner .detail-filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .category-detail-inner .detail-filter-btn {
            padding: 6px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            color: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .category-detail-inner .detail-filter-btn:hover { background: rgba(255,255,255,0.15); }
        .category-detail-inner .detail-filter-btn.active { background: linear-gradient(90deg, #00d4ff, #7b2cbf); border-color: transparent; }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .category-name {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .category-score {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .category-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .category-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .category-stats {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }
        
        /* Detailed Results */
        .results-section {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .section-score {
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        /* Subcategory */
        .subcategory {
            margin-bottom: 25px;
        }
        .subcategory-header {
            font-size: 1rem;
            color: #00d4ff;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
        }
        
        /* Check Items */
        .check-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }
        .check-item.pass { border-left-color: #00c853; }
        .check-item.warning { border-left-color: #ff9800; }
        .check-item.fail { border-left-color: #f44336; }
        .check-item.info { border-left-color: #2196f3; }
        
        .check-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .check-icon {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .check-icon.pass { background: #00c853; }
        .check-icon.warning { background: #ff9800; }
        .check-icon.fail { background: #f44336; }
        .check-icon.info { background: #2196f3; }
        
        .check-name {
            font-weight: 500;
            flex: 1;
        }
        .check-impact {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .impact-Critical { background: #f44336; }
        .impact-High { background: #ff9800; }
        .impact-Medium { background: #2196f3; }
        .impact-Low { background: #607d8b; }
        
        .check-value {
            margin-left: 38px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .check-recommendation {
            margin-left: 38px;
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            border-left: 3px solid #ff9800;
        }
        .check-recommendation::before {
            content: '💡 ';
        }
        
        /* Filter buttons */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.2); }
        .filter-btn.active { background: linear-gradient(90deg, #00d4ff, #7b2cbf); }
        
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            margin-top: 20px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        
        /* AI Recommendations Section */
        .ai-section {
            background: linear-gradient(135deg, rgba(123, 44, 191, 0.2), rgba(0, 212, 255, 0.1));
            border: 1px solid rgba(123, 44, 191, 0.3);
            border-radius: 16px;
            padding: 25px;
            margin: 30px 0;
        }
        .ai-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .ai-icon {
            font-size: 2.5rem;
        }
        .ai-title {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .ai-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        .ai-btn {
            padding: 15px 30px;
            background: linear-gradient(90deg, #7b2cbf, #00d4ff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ai-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(123, 44, 191, 0.4);
        }
        .ai-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .ai-content {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
        }
        .ai-content h1, .ai-content h2, .ai-content h3 {
            color: #00d4ff;
            margin: 20px 0 10px 0;
        }
        .ai-content code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .ai-content pre {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .ai-loading {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
        }
        .ai-loading .spinner {
            width: 30px;
            height: 30px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="tools-tab" id="toolsTab">
        <button class="tools-tab-btn" onclick="document.getElementById('toolsDD').classList.toggle('open')">🛠 Tools ▾</button>
        <div class="tools-dropdown" id="toolsDD">
            <a href="https://www.ai1stseo.com">🏠 Home</a>
            <a href="https://monitor.ai1stseo.com">📊 Website Monitoring</a>
            <a href="https://seoaudit.ai1stseo.com">🔍 SEO Audit</a>
            <a href="https://seoanalysis.ai1stseo.com">📈 SEO Analysis</a>
            <a href="https://docsummarizer.ai1stseo.com">📄 Doc Summarizer</a>
            <a href="https://automationhub.ai1stseo.com">⚙️ Automation Hub</a>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo">🔍 AISEO Master</div>
            <p style="margin-top: 10px; color: rgba(255,255,255,0.7);">236 Comprehensive SEO & AI Optimization Checks</p>
            <div class="url-display" id="urlDisplay">Loading...</div>
        </header>
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Analyzing website with 236 SEO checks across 10 categories...</p>
                <p style="color: rgba(255,255,255,0.5); margin-top: 10px;">This may take 15-30 seconds</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
    <script>
        const API_BASE = 'https://cwb0hb27bf.execute-api.us-east-1.amazonaws.com';

        const categoryMeta = {
            'technical': { name: '⚙️ Technical SEO', desc: 'Crawlability, Indexing, URL Structure, Structured Data', checks: 30 },
            'onpage': { name: '📄 On-Page SEO', desc: 'Title, Meta, Headings, Images, Content Structure', checks: 24 },
            'content': { name: '📝 Content SEO', desc: 'Content Quality, E-E-A-T, Linking', checks: 18 },
            'mobile': { name: '📱 Mobile SEO', desc: 'Viewport, Responsiveness, Touch UX', checks: 15 },
            'performance': { name: '⚡ Performance', desc: 'Core Web Vitals, Compression, Caching', checks: 17 },
            'security': { name: '🔒 Security', desc: 'HTTPS, Security Headers, Forms', checks: 13 },
            'social': { name: '📣 Social SEO', desc: 'Open Graph, Twitter Cards, Social Integration', checks: 24 },
            'local': { name: '📍 Local SEO', desc: 'NAP, Local Schema, Maps, Reviews', checks: 30 },
            'geo': { name: '🤖 GEO/AEO', desc: 'AI Search Optimization, LLM Interpretability, AI Crawlability, Knowledge Graph', checks: 45 },
            'citationgap': { name: '🔀 Citation Gap', desc: 'Google vs AI Visibility, Bridge Strategy, Keyword Alignment', checks: 20 }
        };

        function getTargetUrl() {
            const path = window.location.pathname;
            const match = path.match(/\/audit\/(.+)/);
            if (match) {
                let url = decodeURIComponent(match[1]);
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                return url;
            }
            return null;
        }

        function getCategories() {
            const params = new URLSearchParams(window.location.search);
            const cats = params.get('cats');
            let categories = cats ? cats.split(',') : Object.keys(categoryMeta);
            // Always include citationgap if not already present
            if (!categories.includes('citationgap')) {
                categories.push('citationgap');
            }
            return categories;
        }

        function getScoreColor(score) {
            if (score >= 80) return '#00c853';
            if (score >= 60) return '#8bc34a';
            if (score >= 40) return '#ff9800';
            return '#f44336';
        }

        function renderResults(data) {
            const content = document.getElementById('content');
            
            // Calculate totals
            const failedChecks = data.totalChecks - data.totalPassed;
            const warningChecks = Object.values(data.categories).reduce((sum, cat) => 
                sum + cat.checks.filter(c => c.status === 'warning').length, 0);
            const passedChecks = data.totalPassed;

            let html = `
                <!-- Overall Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" style="color: ${getScoreColor(data.overallScore)}">${Math.round(data.overallScore)}%</div>
                        <div class="stat-label">Overall Score</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #00d4ff">${data.totalChecks}</div>
                        <div class="stat-label">Total Checks</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #00c853">${passedChecks}</div>
                        <div class="stat-label">Passed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #ff9800">${warningChecks}</div>
                        <div class="stat-label">Warnings</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #f44336">${failedChecks - warningChecks}</div>
                        <div class="stat-label">Failed</div>
                    </div>
                </div>

                <!-- Category Overview Cards -->
                <h2 style="margin-bottom: 15px; font-size: 1.2rem;">📊 Category Overview (Click to view details)</h2>
                <div class="category-overview">
            `;

            // Add category cards with inline expandable detail wrappers
            for (const [catKey, catData] of Object.entries(data.categories)) {
                const meta = categoryMeta[catKey] || { name: catKey, desc: '', checks: catData.total };
                const scoreColor = getScoreColor(catData.score);
                const failCount = catData.checks.filter(c => c.status === 'fail').length;
                const warnCount = catData.checks.filter(c => c.status === 'warning').length;
                let statusSummary = '';
                if (failCount > 0) statusSummary += `<span style="color:#f44336;margin-left:8px;">${failCount} failed</span>`;
                if (warnCount > 0) statusSummary += `<span style="color:#ff9800;margin-left:8px;">${warnCount} warnings</span>`;
                html += `
                    <div class="category-card" data-category="${catKey}">
                        <div class="category-header">
                            <span class="category-name">${meta.name} <span class="expand-icon">▼</span></span>
                            <span class="category-score" style="color: ${scoreColor}">${Math.round(catData.score)}%</span>
                        </div>
                        <div class="category-bar">
                            <div class="category-bar-fill" style="width: ${catData.score}%; background: ${scoreColor}"></div>
                        </div>
                        <div class="category-stats">${catData.passed}/${catData.total} passed • ${meta.desc}${statusSummary}</div>
                    </div>
                    <div class="category-detail-wrapper" id="detail-${catKey}">
                        <div class="category-detail-inner" id="detail-inner-${catKey}"></div>
                    </div>
                `;
            }

            html += `</div>

                <!-- AI Recommendations Section -->
                <div class="ai-section" id="aiSection">
                    <div class="ai-header">
                        <span class="ai-icon">🤖</span>
                        <div>
                            <div class="ai-title">AI-Powered Recommendations</div>
                            <div class="ai-subtitle">Get comprehensive analysis across all 9 SEO categories with personalized fixes, code snippets, and a 90-day action plan (Powered by Llama 3.1 + P40 GPU Accelerator)</div>
                        </div>
                    </div>
                    <button class="ai-btn" id="aiBtn" onclick="getAIRecommendations()">
                        <span>✨</span> Generate AI Recommendations
                    </button>
                    <div id="aiContent"></div>
                </div>

                <!-- Content Brief Generator Section -->
                <div class="ai-section" id="briefSection">
                    <div class="ai-header">
                        <span class="ai-icon">📝</span>
                        <div>
                            <div class="ai-title">AI Content Brief Generator</div>
                            <div class="ai-subtitle">Auto-generates a structured content brief by analyzing top Google competitors for your page's primary keyword — headings, word count targets, questions to answer, and AI citation tips</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
                        <select id="briefContentType" style="background:#1a1a2e;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:8px 14px;border-radius:8px;font-size:0.85rem;cursor:pointer;">
                            <option value="blog" style="background:#1a1a2e;color:#fff;">Blog Post</option>
                            <option value="faq" style="background:#1a1a2e;color:#fff;">FAQ Page</option>
                            <option value="landing_page" style="background:#1a1a2e;color:#fff;">Landing Page</option>
                            <option value="how_to" style="background:#1a1a2e;color:#fff;">How-To Guide</option>
                            <option value="comparison" style="background:#1a1a2e;color:#fff;">Comparison Article</option>
                            <option value="listicle" style="background:#1a1a2e;color:#fff;">Listicle</option>
                        </select>
                    </div>
                    <button class="ai-btn" id="briefBtn" onclick="generateContentBrief()">
                        <span>📋</span> Generate Content Brief
                    </button>
                    <div id="briefContent"></div>
                </div>

                <div style="text-align: center; padding: 30px;">
                    <button class="back-btn" onclick="showEmailGate()" style="background: linear-gradient(90deg, #00c853, #00e676); margin-right: 12px;">📄 Download PDF Report</button>
                    <a href="/" class="back-btn">← Analyze Another URL</a>
                </div>

                <!-- Email Gate Modal -->
                <div id="emailGateModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;">
                    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(0,212,255,0.3);border-radius:16px;padding:32px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
                        <div style="font-size:2.5rem;margin-bottom:12px;">📄</div>
                        <h3 style="font-size:1.2rem;margin-bottom:8px;color:#fff;">Get Your Free PDF Report</h3>
                        <p style="color:rgba(255,255,255,0.6);font-size:0.85rem;margin-bottom:20px;">Enter your email to download the full SEO audit report with scores, recommendations, and action items.</p>
                        <input type="email" id="pdfEmailInput" placeholder="your@email.com" style="width:100%;padding:12px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-size:1rem;outline:none;margin-bottom:12px;" />
                        <div id="emailError" style="color:#f44336;font-size:0.8rem;margin-bottom:12px;display:none;">Please enter a valid email address.</div>
                        <button onclick="submitEmailAndDownload()" style="width:100%;padding:14px;background:linear-gradient(90deg,#00c853,#00e676);color:#000;font-weight:700;font-size:1rem;border:none;border-radius:10px;cursor:pointer;margin-bottom:10px;">Download PDF Report</button>
                        <button onclick="closeEmailGate()" style="background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:0.85rem;padding:8px;">Cancel</button>
                    </div>

        function renderCategoryDetail(catKey, filter) {
            const container = document.getElementById('detail-inner-' + catKey);
            const catData = window.auditData.categories[catKey];
            const meta = categoryMeta[catKey] || { name: catKey, desc: '' };
            
            // Filter checks
            let checks = catData.checks;
            if (filter !== 'all') {
                checks = checks.filter(c => c.status === filter);
            }

            // Count by status for filter badges
            const counts = { all: catData.checks.length, pass: 0, fail: 0, warning: 0, info: 0 };
            catData.checks.forEach(c => { if (counts[c.status] !== undefined) counts[c.status]++; });

            let html = `
                <div class="section-header">
                    <div>
                        <div class="section-title">${meta.name}</div>
                        <div style="color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 5px;">${meta.desc}</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="section-score" style="color: ${getScoreColor(catData.score)}">${Math.round(catData.score)}%</div>
                        <div style="color: rgba(255,255,255,0.6); font-size: 0.85rem;">${catData.passed}/${catData.total} passed</div>
                    </div>
                </div>
                <div class="detail-filter-bar">
                    <button class="detail-filter-btn ${filter === 'all' ? 'active' : ''}" onclick="renderCategoryDetail('${catKey}','all')">All (${counts.all})</button>
                    <button class="detail-filter-btn ${filter === 'fail' ? 'active' : ''}" onclick="renderCategoryDetail('${catKey}','fail')">❌ Failed (${counts.fail})</button>
                    <button class="detail-filter-btn ${filter === 'warning' ? 'active' : ''}" onclick="renderCategoryDetail('${catKey}','warning')">⚠️ Warnings (${counts.warning})</button>
                    <button class="detail-filter-btn ${filter === 'pass' ? 'active' : ''}" onclick="renderCategoryDetail('${catKey}','pass')">✓ Passed (${counts.pass})</button>
                    <button class="detail-filter-btn ${filter === 'info' ? 'active' : ''}" onclick="renderCategoryDetail('${catKey}','info')">ℹ️ Info (${counts.info})</button>
                </div>
            `;

            if (checks.length === 0) {
                html += `<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.5);">No checks match this filter.</div>`;
            } else {
                // Group by subcategory
                const grouped = {};
                checks.forEach(check => {
                    const subcat = check.category || 'General';
                    if (!grouped[subcat]) grouped[subcat] = [];
                    grouped[subcat].push(check);
                });

                for (const [subcat, subcatChecks] of Object.entries(grouped)) {
                    const subcatPassed = subcatChecks.filter(c => c.status === 'pass').length;
                    html += `
                        <div class="subcategory">
                            <div class="subcategory-header">
                                <span>${subcat}</span>
                                <span>${subcatPassed}/${subcatChecks.length} passed</span>
                            </div>
                    `;

                    subcatChecks.forEach(check => {
                        const icons = { pass: '✓', warning: '⚠', fail: '✗', info: 'ℹ' };
                        html += `
                            <div class="check-item ${check.status}">
                                <div class="check-header">
                                    <div class="check-icon ${check.status}">${icons[check.status]}</div>
                                    <span class="check-name">${check.name}</span>
                                    ${check.impact ? `<span class="check-impact impact-${check.impact}">${check.impact}</span>` : ''}
                                </div>
                                <div class="check-value">${check.description}: <strong>${check.value}</strong></div>
                                ${check.status !== 'pass' ? `<div class="check-recommendation">${check.recommendation}</div>` : ''}
                            </div>
                        `;
                    });

                    html += `</div>`;
                }
            }

            container.innerHTML = html;
        }

        function submitEmailAndDownload() {
            var email = document.getElementById('pdfEmailInput').value.trim();
            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                document.getElementById('emailError').style.display = 'block';
                return;
            }
            // Store collected email
            try {
                var emails = JSON.parse(localStorage.getItem('ai1stseo_pdf_emails') || '[]');

        function downloadPDFReport() {
            var data = window.auditData;
            if (!data) { alert('No audit data available.'); return; }
            if (!window.jspdf) { alert('PDF library still loading. Please wait a moment and try again.'); return; }

            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            var pageW = doc.internal.pageSize.getWidth();
            var pageH = doc.internal.pageSize.getHeight();
            var margin = 18;
            var y = 20;
            var maxW = pageW - margin * 2;

            // Strip emoji and non-ASCII characters for PDF compatibility
            function clean(str) {
                if (!str) return '';
                return String(str).replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27BF}]|[\u{FE00}-\u{FEFF}]|[\u{1F900}-\u{1F9FF}]|[\u{200D}\u{20E3}\u{FE0F}]|[\u{E000}-\u{F8FF}]|[\u2700-\u27BF]|[\u2600-\u26FF]|[\u2300-\u23FF]|[\u2B50]|[\u2934\u2935]|[\u25A0-\u25FF]|[\u2190-\u21FF]|[\u2000-\u200F]|[\u2028\u2029]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]/gu, '').replace(/[^\x20-\x7E\xA0-\xFF]/g, '').trim();
            }

            function checkPage(needed) {
                if (y + needed > pageH - 20) {
                    doc.addPage();
                    y = 20;
                }
            }

            function addText(text, size, color, bold, maxWidth) {
                doc.setFontSize(size);
                doc.setTextColor(color[0], color[1], color[2]);
                if (bold) doc.setFont('helvetica', 'bold');
                else doc.setFont('helvetica', 'normal');
                var lines = doc.splitTextToSize(clean(text), maxWidth || maxW);
                checkPage(lines.length * size * 0.45 + 2);
                doc.text(lines, margin, y);
                y += lines.length * size * 0.45 + 2;
            }

            // Header
            doc.setFillColor(10, 10, 10);
            doc.rect(0, 0, pageW, 45, 'F');
            doc.setFontSize(22);
            doc.setTextColor(0, 212, 255);
            doc.setFont('helvetica', 'bold');
            doc.text('AI1stSEO Audit Report', margin, 18);
            doc.setFontSize(10);
            doc.setTextColor(180, 180, 180);
            doc.setFont('helvetica', 'normal');
            doc.text(clean(data.url || 'Unknown URL'), margin, 26);
            doc.text('Generated: ' + new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }), margin, 32);
            doc.text('236 checks across 10 categories', margin, 38);
            y = 55;

            // Overall Score
            var scoreColor = data.overallScore >= 80 ? [0, 200, 83] : data.overallScore >= 60 ? [139, 195, 74] : data.overallScore >= 40 ? [255, 152, 0] : [244, 67, 54];
            doc.setFillColor(245, 245, 245);
            doc.roundedRect(margin, y, maxW, 28, 3, 3, 'F');
            doc.setFontSize(28);
            doc.setTextColor(scoreColor[0], scoreColor[1], scoreColor[2]);
            doc.setFont('helvetica', 'bold');
            doc.text(Math.round(data.overallScore) + '%', margin + 8, y + 18);
            doc.setFontSize(11);
            doc.setTextColor(80, 80, 80);
            doc.text('Overall Score', margin + 38, y + 12);
            doc.setFontSize(9);
            doc.setTextColor(120, 120, 120);
            doc.setFont('helvetica', 'normal');
            doc.text(data.totalPassed + ' / ' + data.totalChecks + ' checks passed', margin + 38, y + 20);
            y += 36;

            // Category Breakdown
            addText('Category Breakdown', 14, [0, 0, 0], true);
            y += 2;

            var catEntries = Object.entries(data.categories);
            for (var ci = 0; ci < catEntries.length; ci++) {
                var catKey = catEntries[ci][0];
                var catData = catEntries[ci][1];
                var meta = categoryMeta[catKey] || { name: catKey, desc: '' };
                var catName = clean(meta.name);
                var sc = Math.round(catData.score);
                var scCol = sc >= 80 ? [0, 200, 83] : sc >= 60 ? [139, 195, 74] : sc >= 40 ? [255, 152, 0] : [244, 67, 54];

                checkPage(14);
                doc.setFillColor(250, 250, 250);
                doc.roundedRect(margin, y, maxW, 10, 2, 2, 'F');

                // Progress bar background
                doc.setFillColor(230, 230, 230);
                doc.roundedRect(margin + 55, y + 3.5, 70, 3, 1.5, 1.5, 'F');
                // Progress bar fill
                doc.setFillColor(scCol[0], scCol[1], scCol[2]);
                var barW = Math.max(sc * 0.7, 1);
                doc.roundedRect(margin + 55, y + 3.5, barW, 3, 1.5, 1.5, 'F');

                doc.setFontSize(9);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(40, 40, 40);
                doc.text(clean(catName), margin + 3, y + 6.5);

                doc.setFontSize(9);
                doc.setTextColor(scCol[0], scCol[1], scCol[2]);
                doc.text(sc + '%', margin + 128, y + 6.5);

                doc.setFont('helvetica', 'normal');
                doc.setTextColor(120, 120, 120);
                doc.setFontSize(8);
                doc.text(catData.passed + '/' + catData.total + ' passed', margin + 140, y + 6.5);

                y += 12;
            }
            y += 6;

            // Issues Found
            addText('Issues & Recommendations', 14, [0, 0, 0], true);
            y += 2;

            for (var ci2 = 0; ci2 < catEntries.length; ci2++) {
                var catKey2 = catEntries[ci2][0];
                var catData2 = catEntries[ci2][1];
                var meta2 = categoryMeta[catKey2] || { name: catKey2 };
                var catName2 = clean(meta2.name);
                var issues = catData2.checks.filter(function(c) { return c.status === 'fail' || c.status === 'warning'; });

                if (issues.length === 0) continue;

                checkPage(12);
                addText(catName2 + ' (' + issues.length + ' issues)', 11, [0, 100, 180], true);

                for (var ii = 0; ii < issues.length; ii++) {
                    var check = issues[ii];
                    var statusIcon = check.status === 'fail' ? 'X FAIL' : '! WARN';
                    var statusCol = check.status === 'fail' ? [244, 67, 54] : [255, 152, 0];

                    checkPage(18);
                    doc.setFontSize(9);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(statusCol[0], statusCol[1], statusCol[2]);
                    doc.text(statusIcon, margin + 2, y);
                    doc.setTextColor(40, 40, 40);
                    var nameLines = doc.splitTextToSize(clean(check.name), maxW - 25);
                    doc.text(nameLines, margin + 18, y);
                    y += nameLines.length * 4 + 1;

                    if (check.description && check.value) {
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(8);
                        doc.setTextColor(100, 100, 100);
                        var valLines = doc.splitTextToSize(clean(check.description + ': ' + check.value), maxW - 20);
                        checkPage(valLines.length * 3.5);
                        doc.text(valLines, margin + 18, y);
                        y += valLines.length * 3.5 + 1;
                    }

                    if (check.recommendation) {
                        doc.setFontSize(8);
                        doc.setTextColor(80, 80, 80);
                        var recLines = doc.splitTextToSize('> ' + clean(check.recommendation), maxW - 20);
                        checkPage(recLines.length * 3.5);
                        doc.text(recLines, margin + 18, y);
                        y += recLines.length * 3.5 + 2;
                    }
                    y += 2;
                }
                y += 4;
            }

            // Footer on last page
            doc.setFontSize(8);
            doc.setTextColor(150, 150, 150);
            doc.setFont('helvetica', 'normal');
            doc.text('Generated by AI1stSEO — www.ai1stseo.com', margin, pageH - 10);

            // Save
            var filename = 'AI1stSEO-Audit-' + (data.url || 'report').replace(/https?:\/\//, '').replace(/[^a-zA-Z0-9.-]/g, '_').substring(0, 40) + '.pdf';
            doc.save(filename);
        }

        async function runAnalysis() {
            const targetUrl = getTargetUrl();
            const categories = getCategories();
            
            document.getElementById('urlDisplay').textContent = targetUrl || 'No URL specified';

            if (!targetUrl) {
                renderError('No URL specified. Please go back and enter a URL to analyze.');
                return;
            }

            try {
                document.getElementById('content').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Analyzing ${targetUrl}...</p>
                        <p style="color: rgba(255,255,255,0.5); margin-top: 10px;">Running 236 checks across ${categories.length} categories...</p>
                    </div>
                `;
                
                const response = await fetch(API_BASE + '/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: targetUrl, categories: categories })
                });

                const data = await response.json();

                if (!response.ok) {
                    renderError(data.error || 'Failed to analyze URL');
                    return;
                }

                renderResults(data);

                // Save to localStorage for dashboard
                try {
                    var audits = JSON.parse(localStorage.getItem('ai1stseo_audits') || '[]');
                    audits.unshift({
                        url: data.url || targetUrl,
                        overallScore: data.overallScore,
                        totalChecks: data.totalChecks,
                        totalPassed: data.totalPassed,
                        categories: Object.fromEntries(
                            Object.entries(data.categories).map(function(e) {
                                return [e[0], { score: e[1].score, passed: e[1].passed, total: e[1].total }];
                            })
                        ),
                        date: new Date().toISOString()
                    });
                    if (audits.length > 20) audits = audits.slice(0, 20);
                    localStorage.setItem('ai1stseo_audits', JSON.stringify(audits));
                } catch(e) { console.warn('Could not save audit to history:', e); }
            } catch (error) {
                console.error('Error:', error);
                renderError('Network error: ' + error.message);
            }
        }

        // Run on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', runAnalysis);
        } else {
            runAnalysis();
        }
    </script>
</body>
</html>
