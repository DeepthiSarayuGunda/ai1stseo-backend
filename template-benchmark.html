<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Benchmark — AI1stSEO</title>
    <style>
        :root{--bg:#0a0a0a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#fff;--muted:rgba(255,255,255,0.6);--faint:rgba(255,255,255,0.3);--accent:#00d4ff;--green:#00ff88;--purple:#a855f7;--orange:#ff9800;--red:#f44336;--blue:#3b82f6}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        nav{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .logo{color:var(--accent);font-weight:700;font-size:1.1rem;text-decoration:none}
        .nav-r a{color:var(--muted);text-decoration:none;font-size:0.85rem;margin-left:18px}
        .wrap{max-width:1100px;margin:0 auto;padding:28px 20px}
        .hero{text-align:center;margin-bottom:24px}
        .hero h1{font-size:1.5rem;margin-bottom:6px;background:linear-gradient(90deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hero p{color:var(--muted);font-size:0.88rem;max-width:640px;margin:0 auto}
        .bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
        .bar input{flex:1;min-width:260px;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:0.95rem;outline:none}
        .bar input:focus{border-color:var(--accent)}
        .bar select{padding:12px 16px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:10px;font-size:0.88rem;cursor:pointer}
        .bar select option{background:#1a1a2e;color:#fff}
        .btn{padding:12px 24px;border:none;border-radius:10px;color:#fff;font-weight:600;font-size:0.9rem;cursor:pointer;transition:transform 0.15s}
        .btn:hover{transform:translateY(-1px)}
        .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .btn-primary{background:linear-gradient(90deg,var(--accent),var(--purple))}
        .btn-ghost{background:rgba(255,255,255,0.06);border:1px solid var(--border)}
        .btn-ghost.active{background:rgba(0,212,255,0.1);border-color:var(--accent);color:var(--accent)}
        .tabs{display:flex;gap:8px;justify-content:center;margin:20px 0}
        .scores{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin:20px 0}
        .sc{text-align:center;padding:18px 14px;background:var(--card);border:1px solid var(--border);border-radius:14px;min-width:105px;transition:border-color 0.3s}
        .sc:hover{border-color:rgba(255,255,255,0.15)}
        .sc-n{font-size:1.8rem;font-weight:800}
        .sc-l{font-size:0.68rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
        .sc-bar{height:4px;border-radius:2px;background:rgba(255,255,255,0.06);margin-top:8px;overflow:hidden}
        .sc-fill{height:100%;border-radius:2px;transition:width 0.8s ease}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}
        @media(max-width:768px){.grid2{grid-template-columns:1fr}}
        .col{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
        .col h3{font-size:0.92rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .row{display:flex;align-items:start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.82rem}
        .row:last-child{border-bottom:none}
        .ri{flex-shrink:0;width:18px;text-align:center}
        .rn{flex:1}
        .rv{color:var(--muted);font-size:0.78rem;text-align:right;max-width:200px}
        .gap{background:rgba(244,67,54,0.04);border:1px solid rgba(244,67,54,0.12);border-radius:12px;padding:13px;margin-bottom:8px}
        .gap-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
        .gap-t{font-weight:600;font-size:0.86rem}
        .gap-p{background:rgba(244,67,54,0.15);color:var(--red);padding:2px 10px;border-radius:20px;font-size:0.72rem}
        .gap-d{font-size:0.8rem;color:var(--muted);line-height:1.5}
        .sec{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
        .sec-t{font-weight:600;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
        .ai{background:linear-gradient(135deg,rgba(168,85,247,0.06),rgba(0,212,255,0.06));border:1px solid rgba(168,85,247,0.18);border-radius:14px;padding:16px;margin:14px 0}
        .ai h3{color:var(--purple);margin-bottom:8px;font-size:0.92rem}
        .ai pre{white-space:pre-wrap;font-size:0.83rem;color:var(--muted);line-height:1.7;font-family:inherit}
        .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.7rem;font-weight:600}
        .tag-p{background:rgba(0,255,136,0.1);color:var(--green)}
        .tag-f{background:rgba(244,67,54,0.1);color:var(--red)}
        .loading{text-align:center;padding:50px;color:var(--muted)}
        .spinner{display:inline-block;width:22px;height:22px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;margin-right:10px;vertical-align:middle}
        @keyframes sp{to{transform:rotate(360deg)}}
        .tmpl-sec{background:rgba(0,212,255,0.03);border:1px solid rgba(0,212,255,0.1);border-radius:10px;padding:12px;margin-bottom:8px}
        .tmpl-sec h4{font-size:0.85rem;color:var(--accent);margin-bottom:4px}
        .tmpl-sec p{font-size:0.8rem;color:var(--muted)}
        .tmpl-meta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
        .tmpl-chip{background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:4px 12px;border-radius:20px;font-size:0.75rem}
    </style>
</head>
<body>
<nav>
    <a href="https://www.ai1stseo.com" class="logo">🔍 AI1stSEO</a>
    <div class="nav-r">
        <a href="https://www.ai1stseo.com">Home</a>
        <a href="https://www.ai1stseo.com/dashboard.html">Dashboard</a>
        <a href="https://www.ai1stseo.com/audit.html">Audit</a>
    </div>
</nav>
<div class="wrap">
    <div class="hero">
        <h1>📊 AEO/GEO/SEO Template Benchmark</h1>
        <p>Benchmark any URL against the perfect template for its business type. See side-by-side gaps, view the ideal page structure, and get AI-powered fix recommendations.</p>
    </div>
    <div class="bar">
        <input type="text" id="url" placeholder="Enter URL to benchmark..." />
        <select id="type">
            <option value="">Business type...</option>
            <option value="service">Service (Dentist, Plumber, Lawyer)</option>
            <option value="manufacturing">Manufacturing (Factory, Supplier)</option>
            <option value="ecommerce">E-Commerce / Retail</option>
            <option value="saas">SaaS / Technology</option>
        </select>
        <button class="btn btn-primary" id="goBtn" onclick="run()">🎯 Benchmark</button>
    </div>
    <div id="out"></div>
</div>
<script>
const API='https://cwb0hb27bf.execute-api.us-east-1.amazonaws.com';
let lastResult=null;

async function run(){
    const url=document.getElementById('url').value.trim();
    const type=document.getElementById('type').value;
    const btn=document.getElementById('goBtn');
    const out=document.getElementById('out');
    if(!url){alert('Enter a URL');return}
    if(!type){alert('Select a business type');return}
    btn.disabled=true;btn.textContent='⏳ Analyzing...';
    out.innerHTML='<div class="loading"><span class="spinner"></span>Benchmarking against perfect '+type+' template...</div>';
    try{
        const fu=url.startsWith('http')?url:'https://'+url;
        const[benchRes,tmplRes]=await Promise.all([
            fetch(API+'/api/template-benchmark',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:fu,business_type:type})}),
            fetch(API+'/api/template-perfect/'+type)
        ]);
        const d=await benchRes.json();
        const t=await tmplRes.json();
        if(d.status!=='success'){out.innerHTML='<div style="padding:20px;background:rgba(244,67,54,0.1);border-radius:12px;color:var(--red);">'+(d.error||'Error')+'</div>';btn.disabled=false;btn.textContent='🎯 Benchmark';return}
        lastResult={benchmark:d,template:t.template};
        renderResults('compare');
    }catch(e){out.innerHTML='<div style="padding:20px;background:rgba(244,67,54,0.1);border-radius:12px;color:var(--red);">Error: '+e.message+'</div>'}
    btn.disabled=false;btn.textContent='🎯 Benchmark';
}

function renderResults(view){
    if(!lastResult)return;
    const d=lastResult.benchmark;
    const tmpl=lastResult.template;
    const b=d.benchmark;
    const out=document.getElementById('out');
    let h='';

    // Tabs
    h+='<div class="tabs">';
    h+='<button class="btn btn-ghost '+(view==='compare'?'active':'')+'" onclick="renderResults(\'compare\')">📊 Compare</button>';
    h+='<button class="btn btn-ghost '+(view==='gaps'?'active':'')+'" onclick="renderResults(\'gaps\')">🔍 Gap Details</button>';
    h+='<button class="btn btn-ghost '+(view==='perfect'?'active':'')+'" onclick="renderResults(\'perfect\')">✨ Perfect Template</button>';
    h+='</div>';

    // Scores (always visible)
    h+='<div class="scores">';
    h+=sc(b.overall_score,'Overall','#10b981');
    h+=sc(b.aeo_score,'AEO','#a855f7');
    h+=sc(b.seo_score,'SEO','#3b82f6');
    h+=sc(b.content_score,'Content','#ff9800');
    h+='</div>';
    h+='<div style="text-align:center;margin-bottom:16px;"><span style="background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);padding:5px 14px;border-radius:20px;font-size:0.8rem;">'+d.template+' template — <strong>'+b.total_gaps+' gaps</strong> — '+(100-b.overall_score)+' pts to perfect</span></div>';

    if(view==='compare') h+=renderCompare(b,d,tmpl);
    else if(view==='gaps') h+=renderGaps(b,d);
    else if(view==='perfect') h+=renderPerfect(tmpl,d);

    out.innerHTML=h;
}

function renderCompare(b,d,tmpl){
    let h='';
    const allGaps=[...(b.gaps.aeo||[]),...(b.gaps.seo||[]),...(b.gaps.content||[])];
    const passing=getPassingChecks(b);

    h+='<div class="grid2">';
    // Left: Your page
    h+='<div class="col" style="border-color:rgba(244,67,54,0.2);">';
    h+='<h3><span style="color:var(--red);">📄</span> Your Page</h3>';
    passing.forEach(c=>{h+='<div class="row"><span class="ri" style="color:var(--green);">✓</span><span class="rn">'+c+'</span><span class="rv tag tag-p">Pass</span></div>'});
    allGaps.forEach(g=>{h+='<div class="row"><span class="ri" style="color:var(--red);">✗</span><span class="rn">'+g.check+'</span><span class="rv" style="color:var(--red);">'+g.current+'</span></div>'});
    h+='</div>';

    // Right: Perfect template
    h+='<div class="col" style="border-color:rgba(0,255,136,0.2);">';
    h+='<h3><span style="color:var(--green);">✨</span> Perfect '+d.template+'</h3>';
    passing.forEach(c=>{h+='<div class="row"><span class="ri" style="color:var(--green);">✓</span><span class="rn">'+c+'</span><span class="rv tag tag-p">Match</span></div>'});
    allGaps.forEach(g=>{h+='<div class="row"><span class="ri" style="color:var(--green);">✓</span><span class="rn">'+g.check+'</span><span class="rv" style="color:var(--green);">'+g.ideal+'</span></div>'});
    h+='</div>';
    h+='</div>';

    // Content sections checklist
    h+='<div class="sec"><div class="sec-t">📋 Content Sections</div>';
    h+='<div class="grid2">';
    b.content_sections.forEach(s=>{
        const found=!b.gaps.content.some(g=>g.check===s.heading);
        h+='<div class="row" style="border:none;padding:5px 10px;background:'+(found?'rgba(0,255,136,0.03)':'rgba(244,67,54,0.03)')+';border-radius:8px;">';
        h+='<span class="ri" style="color:'+(found?'var(--green)':'var(--red)')+';">'+(found?'✓':'✗')+'</span>';
        h+='<span class="rn">'+s.heading+'</span>';
        h+='<span class="tag '+(found?'tag-p':'tag-f')+'">'+(found?'Found':'Missing')+'</span></div>';
    });
    h+='</div></div>';

    if(d.ai_recommendations){h+='<div class="ai"><h3>🤖 AI Fix Recommendations</h3><pre>'+d.ai_recommendations+'</pre></div>'}
    return h;
}

function renderGaps(b,d){
    let h='';
    const cats={aeo:{color:'#a855f7',icon:'🤖',label:'AEO Gaps'},seo:{color:'#3b82f6',icon:'🔍',label:'SEO Gaps'},content:{color:'#ff9800',icon:'📝',label:'Content Gaps'}};
    for(const[cat,meta]of Object.entries(cats)){
        const gaps=b.gaps[cat]||[];
        if(!gaps.length)continue;
        h+='<div class="sec"><div class="sec-t"><span>'+meta.icon+'</span><span style="color:'+meta.color+';">'+meta.label+'</span> <span style="font-size:0.75rem;color:var(--muted);">('+gaps.length+')</span></div>';
        gaps.sort((a,b)=>b.points-a.points).forEach(g=>{
            h+='<div class="gap"><div class="gap-h"><span class="gap-t">'+g.check+'</span><span class="gap-p">-'+g.points+' pts</span></div>';
            h+='<div class="gap-d"><span style="color:var(--red);">Current: '+g.current+'</span> → <span style="color:var(--green);">Ideal: '+g.ideal+'</span></div></div>';
        });
        h+='</div>';
    }
    if(d.ai_recommendations){h+='<div class="ai"><h3>🤖 AI Fix Recommendations</h3><pre>'+d.ai_recommendations+'</pre></div>'}
    return h;
}

function renderPerfect(tmpl,d){
    let h='';
    if(!tmpl){h+='<div style="padding:20px;color:var(--muted);">Template data not available.</div>';return h}

    h+='<div class="sec"><div class="sec-t">✨ Perfect '+tmpl.name+' Template</div>';
    h+='<p style="color:var(--muted);font-size:0.85rem;margin-bottom:14px;">Examples: '+tmpl.examples+'</p>';

    // SEO requirements
    h+='<div style="margin-bottom:16px;"><div style="font-weight:600;color:var(--blue);margin-bottom:8px;">🔍 SEO Requirements</div>';
    h+='<div class="tmpl-sec"><h4>Title Format</h4><p>'+tmpl.seo.title_format+'</p></div>';
    h+='<div class="tmpl-sec"><h4>Meta Description Format</h4><p>'+tmpl.seo.meta_desc_format+'</p></div>';
    h+='<div class="tmpl-meta">';
    h+='<span class="tmpl-chip">Min '+tmpl.seo.min_word_count+' words</span>';
    h+='<span class="tmpl-chip">'+tmpl.seo.internal_links_min+'+ internal links</span>';
    h+='<span class="tmpl-chip">'+tmpl.seo.external_links_min+'+ external links</span>';
    h+='</div>';
    h+='<div style="font-size:0.8rem;color:var(--muted);margin-top:6px;">Required schema: <span style="color:var(--accent);">'+tmpl.seo.required_schema.join(', ')+'</span></div>';
    h+='</div>';

    // AEO requirements
    h+='<div style="margin-bottom:16px;"><div style="font-weight:600;color:var(--purple);margin-bottom:8px;">🤖 AEO Requirements (AI Engine Optimization)</div>';
    h+='<div class="tmpl-meta">';
    h+='<span class="tmpl-chip">'+tmpl.aeo.min_faq_count+'+ FAQs</span>';
    h+='<span class="tmpl-chip">'+tmpl.aeo.min_definitions+'+ definitions</span>';
    h+='<span class="tmpl-chip">'+tmpl.aeo.min_lists+'+ structured lists</span>';
    h+='</div>';
    h+='<div style="font-size:0.8rem;color:var(--muted);margin-top:6px;">Required elements: <span style="color:var(--purple);">'+tmpl.aeo.required_elements.join(', ')+'</span></div>';
    h+='<div style="font-size:0.8rem;color:var(--muted);margin-top:4px;">Citation targets: <span style="color:var(--green);">'+tmpl.aeo.citation_targets.join(', ')+'</span></div>';
    h+='</div>';

    // Content sections blueprint
    h+='<div style="margin-bottom:16px;"><div style="font-weight:600;color:var(--orange);margin-bottom:8px;">📋 Required Content Sections ('+tmpl.content_sections.length+')</div>';
    tmpl.content_sections.forEach((s,i)=>{
        h+='<div class="tmpl-sec"><h4>'+(i+1)+'. '+s.heading+'</h4><p>'+s.purpose+' <span style="color:var(--accent);">('+s.min_words+'+ words)</span></p></div>';
    });
    h+='</div>';

    // GEO requirements
    h+='<div><div style="font-weight:600;color:var(--green);margin-bottom:8px;">📍 GEO Requirements</div>';
    h+='<div class="tmpl-meta">';
    for(const[k,v]of Object.entries(tmpl.geo)){
        if(v===true) h+='<span class="tmpl-chip" style="border-color:rgba(0,255,136,0.2);">✓ '+k.replace(/_/g,' ')+'</span>';
    }
    h+='</div></div>';

    h+='</div>';
    return h;
}

function sc(score,label,color){
    const g=score>=90?'A+':score>=80?'A':score>=70?'B':score>=60?'C':score>=50?'D':'F';
    return '<div class="sc"><div class="sc-n" style="color:'+color+';">'+score+'</div><div class="sc-l">'+label+' ('+g+')</div><div class="sc-bar"><div class="sc-fill" style="width:'+score+'%;background:'+color+';"></div></div></div>';
}

function getPassingChecks(b){
    const checks=['Title Tag','Meta Description','Word Count','Heading Structure','Schema Markup','Internal Links','FAQ Section','Direct Definitions','Structured Lists','Data Tables','Statistics & Data','Source Citations'];
    const failed=[...(b.gaps.aeo||[]),...(b.gaps.seo||[])].map(g=>g.check);
    return checks.filter(c=>failed.indexOf(c)===-1);
}
</script>
</body>
</html>
