<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Compare — AI1stSEO</title>
    <style>
        :root { --bg:#0a0a0a; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08); --text:#fff; --muted:rgba(255,255,255,0.6); --faint:rgba(255,255,255,0.3); --accent:#00d4ff; --green:#00ff88; --purple:#a855f7; --orange:#ff9800; --red:#f44336; --blue:#3b82f6; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        nav { padding:14px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
        .nav-logo { color:var(--accent); font-weight:700; font-size:1.1rem; text-decoration:none; }
        .nav-links a { color:var(--muted); text-decoration:none; font-size:0.85rem; margin-left:18px; }
        .container { max-width:1100px; margin:0 auto; padding:28px 20px; }
        .hero { text-align:center; margin-bottom:28px; }
        .hero h1 { font-size:1.5rem; margin-bottom:6px; background:linear-gradient(90deg,var(--accent),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .hero p { color:var(--muted); font-size:0.88rem; max-width:600px; margin:0 auto; }
        .input-bar { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; justify-content:center; }
        .input-bar input { flex:1; min-width:280px; padding:12px 16px; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:10px; color:#fff; font-size:0.95rem; outline:none; }
        .input-bar input:focus { border-color:var(--accent); }
        .input-bar select { padding:12px 16px; background:#1a1a2e; border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:10px; font-size:0.88rem; cursor:pointer; }
        .input-bar select option { background:#1a1a2e; color:#fff; }
        .btn { padding:12px 28px; background:linear-gradient(90deg,var(--accent),var(--purple)); border:none; border-radius:10px; color:#fff; font-weight:600; font-size:0.95rem; cursor:pointer; transition:transform 0.15s; }
        .btn:hover { transform:translateY(-1px); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .scores-row { display:flex; justify-content:center; gap:24px; flex-wrap:wrap; margin:24px 0; }
        .score-card { text-align:center; padding:20px 16px; background:var(--card); border:1px solid var(--border); border-radius:14px; min-width:110px; transition:border-color 0.3s; }
        .score-card:hover { border-color:rgba(255,255,255,0.15); }
        .score-num { font-size:2rem; font-weight:800; }
        .score-label { font-size:0.7rem; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }
        .score-bar { height:4px; border-radius:2px; background:rgba(255,255,255,0.06); margin-top:8px; overflow:hidden; }
        .score-bar-fill { height:100%; border-radius:2px; transition:width 0.8s ease; }
        .compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:20px 0; }
        @media(max-width:768px) { .compare-grid { grid-template-columns:1fr; } }
        .compare-col { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; }
        .compare-col h3 { font-size:0.95rem; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
        .check-row { display:flex; align-items:start; gap:8px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:0.82rem; }
        .check-row:last-child { border-bottom:none; }
        .check-icon { flex-shrink:0; width:18px; text-align:center; }
        .check-name { flex:1; }
        .check-val { color:var(--muted); font-size:0.78rem; text-align:right; max-width:180px; }
        .gap-card { background:rgba(244,67,54,0.04); border:1px solid rgba(244,67,54,0.12); border-radius:12px; padding:14px; margin-bottom:10px; }
        .gap-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
        .gap-title { font-weight:600; font-size:0.88rem; }
        .gap-pts { background:rgba(244,67,54,0.15); color:var(--red); padding:2px 10px; border-radius:20px; font-size:0.72rem; }
        .gap-detail { font-size:0.8rem; color:var(--muted); line-height:1.5; }
        .gap-current { color:var(--red); }
        .gap-ideal { color:var(--green); }
        .section-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:16px; }
        .section-title { font-weight:600; color:var(--accent); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
        .ai-box { background:linear-gradient(135deg,rgba(168,85,247,0.06),rgba(0,212,255,0.06)); border:1px solid rgba(168,85,247,0.18); border-radius:14px; padding:18px; margin:16px 0; }
        .ai-box h3 { color:var(--purple); margin-bottom:10px; font-size:0.95rem; }
        .ai-box pre { white-space:pre-wrap; font-size:0.84rem; color:var(--muted); line-height:1.7; font-family:inherit; }
        .loading { text-align:center; padding:50px; color:var(--muted); }
        .spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:10px; vertical-align:middle; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .tag { display:inline-block; padding:2px 8px; border-radius:12px; font-size:0.7rem; font-weight:600; }
        .tag-pass { background:rgba(0,255,136,0.1); color:var(--green); }
        .tag-fail { background:rgba(244,67,54,0.1); color:var(--red); }
        .tag-warn { background:rgba(255,152,0,0.1); color:var(--orange); }
    </style>
</head>
<body>
    <nav>
        <a href="https://www.ai1stseo.com" class="nav-logo">🔍 AI1stSEO</a>
        <div class="nav-links">
            <a href="https://www.ai1stseo.com">Home</a>
            <a href="https://www.ai1stseo.com/dashboard.html">Dashboard</a>
            <a href="https://www.ai1stseo.com/template-benchmark.html">Benchmark</a>
        </div>
    </nav>
    <div class="container">
        <div class="hero">
            <h1>📊 Perfect Template vs Your Page</h1>
            <p>See exactly how your page compares to the ideal AEO/GEO/SEO template for your business type — side by side with visual gap analysis</p>
        </div>
        <div class="input-bar">
            <input type="text" id="url" placeholder="Enter your website URL..." />
            <select id="type">
                <option value="" style="background:#1a1a2e;color:#fff;">Business type...</option>
                <option value="service" style="background:#1a1a2e;color:#fff;">Service (Dentist, Plumber, Lawyer)</option>
                <option value="manufacturing" style="background:#1a1a2e;color:#fff;">Manufacturing (Factory, Supplier)</option>
                <option value="ecommerce" style="background:#1a1a2e;color:#fff;">E-Commerce / Retail</option>
                <option value="saas" style="background:#1a1a2e;color:#fff;">SaaS / Technology</option>
            </select>
            <button class="btn" id="goBtn" onclick="run()">🎯 Compare</button>
        </div>
        <div id="out"></div>
    </div>
<script>
const API = 'https://cwb0hb27bf.execute-api.us-east-1.amazonaws.com';

async function run() {
    const url = document.getElementById('url').value.trim();
    const type = document.getElementById('type').value;
    const btn = document.getElementById('goBtn');
    const out = document.getElementById('out');
    if (!url) { alert('Enter a URL'); return; }
    if (!type) { alert('Select a business type'); return; }
    btn.disabled = true; btn.textContent = '⏳ Analyzing...';
    out.innerHTML = '<div class="loading"><span class="spinner"></span>Fetching page, benchmarking against perfect template, generating AI recommendations...</div>';
    try {
        const fullUrl = url.startsWith('http') ? url : 'https://' + url;
        const r = await fetch(API + '/api/template-benchmark', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:fullUrl, business_type:type}) });
        const d = await r.json();
        if (d.status !== 'success') { out.innerHTML = '<div style="padding:20px;background:rgba(244,67,54,0.1);border-radius:12px;color:var(--red);">' + (d.error||'Error') + '</div>'; btn.disabled=false; btn.textContent='🎯 Compare'; return; }
        const b = d.benchmark;
        let h = '';

        // Score cards
        h += '<div class="scores-row">';
        h += sc(b.overall_score, 'Overall', '#10b981');
        h += sc(b.aeo_score, 'AEO', '#a855f7');
        h += sc(b.seo_score, 'SEO', '#3b82f6');
        h += sc(b.content_score, 'Content', '#ff9800');
        h += '</div>';

        // Template info bar
        h += '<div style="text-align:center;margin-bottom:20px;"><span style="background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);padding:6px 16px;border-radius:20px;font-size:0.82rem;">Compared against <strong style="color:var(--accent);">' + d.template + '</strong> perfect template — <strong>' + b.total_gaps + ' gaps</strong> found</span></div>';

        // Side by side: Your Page vs Perfect Template
        h += '<div class="compare-grid">';

        // Left: Your page
        h += '<div class="compare-col" style="border-color:rgba(244,67,54,0.2);">';
        h += '<h3><span style="color:var(--red);">📄</span> Your Page</h3>';
        var allGaps = [...(b.gaps.aeo||[]), ...(b.gaps.seo||[]), ...(b.gaps.content||[])];
        if (allGaps.length === 0) {
            h += '<div style="text-align:center;padding:20px;color:var(--green);font-size:1.1rem;">🎉 Perfect Score!</div>';
        } else {
            allGaps.forEach(function(g) {
                h += '<div class="check-row"><span class="check-icon" style="color:var(--red);">✗</span><span class="check-name">' + g.check + '</span><span class="check-val gap-current">' + g.current + '</span></div>';
            });
        }
        h += '</div>';

        // Right: Perfect template
        h += '<div class="compare-col" style="border-color:rgba(0,255,136,0.2);">';
        h += '<h3><span style="color:var(--green);">✨</span> Perfect ' + d.template + '</h3>';
        allGaps.forEach(function(g) {
            h += '<div class="check-row"><span class="check-icon" style="color:var(--green);">✓</span><span class="check-name">' + g.check + '</span><span class="check-val gap-ideal">' + g.ideal + '</span></div>';
        });
        // Show passing checks too
        var passingChecks = getPassingChecks(b);
        passingChecks.forEach(function(c) {
            h += '<div class="check-row"><span class="check-icon" style="color:var(--green);">✓</span><span class="check-name">' + c + '</span><span class="check-val" style="color:var(--green);">Match</span></div>';
        });
        h += '</div>';
        h += '</div>';

        // Gap details with points
        if (allGaps.length > 0) {
            h += '<div class="section-card">';
            h += '<div class="section-title">🔍 Detailed Gap Analysis — ' + allGaps.length + ' issues to fix</div>';
            var sorted = allGaps.sort(function(a,b) { return b.points - a.points; });
            sorted.forEach(function(g) {
                h += '<div class="gap-card">';
                h += '<div class="gap-header"><span class="gap-title">' + g.check + '</span><span class="gap-pts">-' + g.points + ' pts</span></div>';
                h += '<div class="gap-detail"><span class="gap-current">Current: ' + g.current + '</span> → <span class="gap-ideal">Ideal: ' + g.ideal + '</span></div>';
                h += '</div>';
            });
            h += '</div>';
        }

        // Content sections checklist
        h += '<div class="section-card">';
        h += '<div class="section-title">📋 Required Content Sections</div>';
        h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">';
        b.content_sections.forEach(function(s) {
            var found = !b.gaps.content.some(function(g) { return g.check === s.heading; });
            h += '<div class="check-row" style="border:none;padding:6px 10px;background:' + (found ? 'rgba(0,255,136,0.03)' : 'rgba(244,67,54,0.03)') + ';border-radius:8px;">';
            h += '<span class="check-icon" style="color:' + (found ? 'var(--green)' : 'var(--red)') + ';">' + (found ? '✓' : '✗') + '</span>';
            h += '<span class="check-name">' + s.heading + '</span>';
            h += '<span class="tag ' + (found ? 'tag-pass' : 'tag-fail') + '">' + (found ? 'Found' : 'Missing') + '</span>';
            h += '</div>';
        });
        h += '</div></div>';

        // AI recommendations
        if (d.ai_recommendations) {
            h += '<div class="ai-box"><h3>🤖 AI Fix Recommendations</h3><pre>' + d.ai_recommendations + '</pre></div>';
        }

        out.innerHTML = h;
    } catch(e) {
        out.innerHTML = '<div style="padding:20px;background:rgba(244,67,54,0.1);border-radius:12px;color:var(--red);">Connection error: ' + e.message + '</div>';
    }
    btn.disabled = false; btn.textContent = '🎯 Compare';
}

function sc(score, label, color) {
    var grade = score >= 90 ? 'A+' : score >= 80 ? 'A' : score >= 70 ? 'B' : score >= 60 ? 'C' : score >= 50 ? 'D' : 'F';
    return '<div class="score-card"><div class="score-num" style="color:' + color + ';">' + score + '</div><div class="score-label">' + label + ' (' + grade + ')</div><div class="score-bar"><div class="score-bar-fill" style="width:' + score + '%;background:' + color + ';"></div></div></div>';
}

function getPassingChecks(b) {
    var checks = ['Title Tag', 'Meta Description', 'Word Count', 'Heading Structure', 'Schema Markup', 'Internal Links', 'FAQ Section', 'Direct Definitions', 'Structured Lists', 'Data Tables', 'Statistics & Data', 'Source Citations'];
    var failedNames = [...(b.gaps.aeo||[]), ...(b.gaps.seo||[])].map(function(g) { return g.check; });
    return checks.filter(function(c) { return failedNames.indexOf(c) === -1; });
}
</script>
</body>
</html>
