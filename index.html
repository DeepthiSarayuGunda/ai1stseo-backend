    <script>
      // Intercept ALL navigation to /audit/ and force full page reload with all categories
      (function() {
        // Intercept history.pushState
        const originalPushState = history.pushState;
        history.pushState = function(state, title, url) {
          if (url && url.includes('/audit/')) {
            const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
            let newUrl = url;
            if (url.includes('?cats=')) {
              newUrl = url.replace(/\?cats=[^&]*/, '?cats=' + allCats);
            } else if (url.includes('?')) {
              newUrl = url + '&cats=' + allCats;
            } else {
              newUrl = url + '?cats=' + allCats;
            }
            window.location.href = newUrl;
            return;
          }
          return originalPushState.apply(this, arguments);
        };

        // Intercept history.replaceState
        const originalReplaceState = history.replaceState;
        history.replaceState = function(state, title, url) {
          if (url && url.includes('/audit/')) {
            const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
            let newUrl = url;
            if (url.includes('?cats=')) {
              newUrl = url.replace(/\?cats=[^&]*/, '?cats=' + allCats);
            } else if (url.includes('?')) {
              newUrl = url + '&cats=' + allCats;
            } else {
              newUrl = url + '?cats=' + allCats;
            }
            window.location.href = newUrl;
            return;
          }
          return originalReplaceState.apply(this, arguments);
        };

        // Intercept clicks on links
        document.addEventListener('click', function(e) {
          const target = e.target.closest('a, button');
          if (target) {
            const href = target.getAttribute('href') || target.getAttribute('data-href') || '';
            if (href.includes('/audit/')) {
              e.preventDefault();
              e.stopPropagation();
              const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
              let newUrl = href;
              if (href.includes('?cats=')) {
                newUrl = href.replace(/\?cats=[^&]*/, '?cats=' + allCats);
              } else if (href.includes('?')) {
                newUrl = href + '&cats=' + allCats;
              } else {
                newUrl = href + '?cats=' + allCats;
              }
              window.location.href = newUrl;
            }
          }
        }, true);
      })();
    </script>

  <body>
    <div id="root"></div>

    <!-- ── AEO Rank Tracker Section (static, always visible) ──────────── -->
    <section id="aeo-section" style="width:100%;padding:48px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;border-top:1px solid rgba(255,255,255,0.06);background:linear-gradient(180deg,rgba(15,52,96,0.3) 0%,transparent 100%);">

        <form id="aeo-scan-form" style="display:flex;gap:10px;max-width:520px;margin:0 auto;flex-wrap:wrap;">
          <input id="aeo-scan-input" type="text" placeholder="yourdomain.com" required

          <button type="submit" id="aeo-scan-btn"

    </section>

    <script>
    // AEO Scan — wired directly to /api/aeo-tracker/run
    (function() {
      var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? '' : 'https://sgnmqxb2sw.us-east-1.awsapprunner.com';

      function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

      document.getElementById('aeo-scan-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var raw = document.getElementById('aeo-scan-input').value.trim();
        if (!raw) return;
        var domain = raw.replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0].toLowerCase();
        if (domain.length < 3) return;
        var brand = domain.split('.')[0];
        var btn = document.getElementById('aeo-scan-btn');
        var box = document.getElementById('aeo-scan-results');

        btn.disabled = true; btn.textContent = 'Scanning\u2026'; btn.style.opacity = '0.5';
        box.style.display = 'block';
        box.innerHTML =
          '<div style="text-align:center;padding:24px 0;">' +
          '<div style="width:36px;height:36px;margin:0 auto 12px;border:3px solid rgba(255,255,255,0.15);border-top-color:#00d4ff;border-radius:50%;animation:aeospin .8s linear infinite"></div>' +
          '<p style="color:rgba(255,255,255,0.5);font-size:.9rem;">Scanning AI models for <strong style="color:#00d4ff;">' + esc(domain) + '</strong>\u2026</p>' +
          '</div><style>@keyframes aeospin{to{transform:rotate(360deg)}}</style>';
        box.scrollIntoView({ behavior: 'smooth', block: 'start' });

        fetch(API_BASE + '/api/aeo-tracker/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ brand_name: brand, target_domain: domain, queries: [
            'best ' + brand + ' alternatives',
            'top tools like ' + domain,
            'is ' + domain + ' recommended'
          ]})
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.status !== 'ok') throw new Error(data.error || 'Scan failed');
          var s = data.summary || {}, res = data.results || [];
          var vis = s.visibility_score || 0;
          var isMock = (s.active_llms || []).indexOf('mock') !== -1;
          var vc = vis >= 50 ? '#00e676' : vis > 0 ? '#ffab00' : '#ff5252';
          var h = '';

          // Header
          h += '<div style="text-align:center;margin-bottom:20px;">';
          h += '<h3 style="font-size:1.15rem;font-weight:700;color:#e6edf3;margin:0 0 4px;">AEO Report: <span style="color:#00d4ff;">' + esc(domain) + '</span></h3>';
          if (isMock) h += '<span style="display:inline-block;margin-top:6px;padding:3px 12px;border-radius:14px;font-size:.72rem;font-weight:600;background:rgba(255,171,0,0.12);color:#ffab00;border:1px solid rgba(255,171,0,0.25);">Demo Mode</span>';
          h += '</div>';

          // Metrics
          h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;">';
          h += mc(vis + '%', 'Visibility', vc);
          h += mc(s.total_scanned || 0, 'Scanned', '#e6edf3');
          h += mc(s.total_cited || 0, 'Citations', '#00e676');
          h += mc(s.best_llm || '\u2014', 'Best LLM', '#ce93d8');
          h += '</div>';

          // Active LLMs
          var al = s.active_llms || [];
          if (al.length) {
            h += '<div style="text-align:center;margin-bottom:16px;">';
            for (var i = 0; i < al.length; i++) {
              var m = al[i] === 'mock';
              h += '<span style="display:inline-block;margin:0 3px;padding:2px 9px;border-radius:12px;font-size:.72rem;' +
                (m ? 'background:rgba(255,171,0,0.1);color:#ffab00;border:1px solid rgba(255,171,0,0.2);'
                   : 'background:rgba(0,230,118,0.1);color:#00e676;border:1px solid rgba(0,230,118,0.2);') +
                '">' + esc(al[i]) + '</span>';
            }
            h += '</div>';
          }

          // Table
          h += '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:.85rem;">';
          h += '<thead><tr>';
          h += th('Query') + th('LLM') + th('Cited');
          h += '</tr></thead><tbody>';
          for (var j = 0; j < res.length; j++) {
            var r = res[j], cited = r.citation_found;
            var bg = cited
              ? '<span style="padding:2px 8px;border-radius:12px;font-size:.72rem;background:rgba(0,230,118,0.12);color:#00e676;border:1px solid rgba(0,230,118,0.25);">Yes</span>'
              : '<span style="padding:2px 8px;border-radius:12px;font-size:.72rem;background:rgba(255,82,82,0.1);color:#ff5252;border:1px solid rgba(255,82,82,0.2);">No</span>';
            h += '<tr style="border-bottom:1px solid rgba(255,255,255,0.04);">';
            h += '<td style="padding:9px 12px;color:rgba(255,255,255,0.8);">' + esc(r.query) + '</td>';
            h += '<td style="padding:9px 12px;"><span style="padding:2px 8px;border-radius:10px;font-size:.72rem;background:rgba(123,44,191,0.12);color:#ce93d8;border:1px solid rgba(123,44,191,0.2);">' + esc(r.llm) + '</span></td>';
            h += '<td style="padding:9px 12px;text-align:center;">' + bg + '</td></tr>';
          }
          h += '</tbody></table></div>';

          // CTA
          h += '<div style="text-align:center;margin-top:24px;">';
          h += '<a href="/aeo-tracker" style="display:inline-block;padding:11px 30px;border-radius:10px;background:linear-gradient(90deg,#00d4ff,#7b2cbf);color:#fff;text-decoration:none;font-size:.92rem;font-weight:600;transition:opacity .2s;" onmouseover="this.style.opacity=\'0.85\'" onmouseout="this.style.opacity=\'1\'">View Full Report \u2192</a>';
          h += '<p style="color:#8b949e;font-size:.73rem;margin-top:8px;">Run custom queries on the full AEO Rank Tracker</p></div>';

          box.innerHTML = h;
        })
        .catch(function(err) {
          box.innerHTML = '<div style="text-align:center;padding:24px 0;"><p style="color:#ff8a80;font-size:.95rem;">\u26a0 ' + esc(err.message || 'Analysis failed. Please try again.') + '</p></div>';
        })
        .finally(function() {
          btn.disabled = false; btn.textContent = 'Run AEO Scan'; btn.style.opacity = '1';
        });
      });

      function mc(val, label, color) {
        return '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;text-align:center;">' +
          '<div style="font-size:1.5rem;font-weight:700;color:' + color + ';margin-bottom:2px;">' + esc(String(val)) + '</div>' +
          '<div style="font-size:.73rem;color:rgba(255,255,255,0.5);">' + esc(label) + '</div></div>';
      }
      function th(t) {
        return '<th style="text-align:left;padding:8px 12px;color:rgba(255,255,255,0.4);font-size:.73rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,0.08);">' + t + '</th>';
      }
    })();
    </script>
    <script>
      // Inject GEO Scanner Agent card into the React dashboard
      (function() {
        var injected = false;
        function tryInject() {
          if (injected) return;
          if (document.getElementById('geo-scanner-card')) { injected = true; return; }
          // Find "GEO Visibility Scanner" text on the page to locate the card grid
          var allEls = document.querySelectorAll('*');
          var geoCard = null;
          for (var i = 0; i < allEls.length; i++) {
            var el = allEls[i];
            if (el.children.length === 0 && el.textContent.trim() === 'GEO Visibility Scanner') {
              geoCard = el;
              break;
            }
          }
          if (!geoCard) return;
          // Walk up to find the card container (the clickable card wrapper)
          var cardEl = geoCard;
          for (var j = 0; j < 8; j++) {
            if (!cardEl.parentElement) break;
            cardEl = cardEl.parentElement;
            // The grid parent has multiple card children
            if (cardEl.children.length >= 3) {
              // This is likely the grid
              var grid = cardEl;
              injected = true;

              var card = document.createElement('div');
              card.id = 'geo-scanner-card';
              card.style.cssText = 'background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);border:2px solid #238636;border-radius:16px;padding:24px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;min-height:160px;';
              card.onmouseover = function(){ card.style.borderColor='#3fb950'; card.style.transform='translateY(-2px)'; card.style.boxShadow='0 4px 20px rgba(35,134,54,0.3)'; };
              card.onmouseout = function(){ card.style.borderColor='#238636'; card.style.transform='none'; card.style.boxShadow='none'; };
              card.onclick = function(){ window.location.href='/geo-scanner'; };
              card.innerHTML = '<div style="font-size:1.8rem;margin-bottom:8px">🔬</div>'
                + '<div style="font-size:1rem;font-weight:700;color:#e1e4e8;margin-bottom:4px">GEO Scanner Agent</div>'
                + '<div style="font-size:0.82rem;color:#8b949e;line-height:1.5;margin-bottom:12px">Full AI visibility scan — runs 4 scanner agents across AI models. Plain-English report with scores and recommendations.</div>'
                + '<span style="display:inline-block;padding:3px 10px;background:#238636;color:#fff;border-radius:6px;font-size:0.72rem;font-weight:600">NEW</span>';

              grid.insertBefore(card, grid.firstChild);
              return;
            }
          }
        }
        var observer = new MutationObserver(tryInject);
        observer.observe(document.body, { childList: true, subtree: true });
        // Also try on interval in case MutationObserver misses it
        var interval = setInterval(function() { tryInject(); if (injected) clearInterval(interval); }, 500);
        setTimeout(function(){ observer.disconnect(); clearInterval(interval); }, 30000);
      })();
    </script>
    <script>
      // Email capture — injected inside #root after React renders
      (function() {
        var done = false;
        function inject() {
          if (done) return;
          if (document.getElementById('growth-email-capture')) { done = true; return; }
          var root = document.getElementById('root');
          if (!root || root.children.length === 0) return;
          var fc = root.children[0];
          if (!fc || fc.offsetHeight < 50) return;
          done = true;

          var el = document.createElement('div');
          el.id = 'growth-email-capture';
          el.style.cssText = 'width:100%;padding:48px 24px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;border-top:1px solid rgba(255,255,255,0.06);';

          el.innerHTML =
            '<div style="max-width:480px;margin:0 auto">'
            + '<p style="color:#00d4ff;font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin:0 0 10px">Free Resource</p>'
            + '<h3 style="color:#e6edf3;font-size:1.25rem;font-weight:600;margin:0 0 8px;line-height:1.3">Get the Free AEO/GEO SEO Analysis</h3>'
            + '<p style="color:#8b949e;font-size:.85rem;margin:0 0 20px;line-height:1.5">Free AI visibility analysis, GEO strategies, and early access to new tools.</p>'
            + '<form id="growth-email-form" style="display:flex;gap:8px;max-width:400px;margin:0 auto;flex-wrap:wrap">'
            + '<input id="growth-email-input" type="email" placeholder="you@company.com" required '
            + 'style="flex:1;min-width:180px;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e6edf3;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s;" '
            + 'onfocus="this.style.borderColor=\'#00d4ff\'" onblur="this.style.borderColor=\'rgba(255,255,255,0.1)\'">'
            + '<button type="submit" id="growth-email-btn" '
            + 'style="padding:10px 20px;border:none;border-radius:8px;background:#00d4ff;color:#0d1117;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:opacity .2s;" '
            + 'onmouseover="this.style.opacity=\'0.85\'" onmouseout="this.style.opacity=\'1\'">Subscribe</button>'
            + '</form>'
            + '<div id="growth-email-msg" style="margin-top:10px;font-size:.8rem;min-height:18px"></div>'
            + '<p style="color:#484f58;font-size:.68rem;margin:12px 0 0">No spam, ever. Unsubscribe anytime.</p>'
            + '</div>';

          // Insert after the stats row (236/10/PDF/24-7) if found, otherwise append to root
          var statNums = root.querySelectorAll('*');
          var target = null;
          for (var i = 0; i < statNums.length; i++) {
            if (statNums[i].children.length === 0 && statNums[i].textContent.trim() === '236') {
              // Walk up to the stats row container
              var p = statNums[i];
              for (var j = 0; j < 8; j++) {
                if (!p.parentElement || p.parentElement === root) break;
                p = p.parentElement;
                // Stats row typically has 4+ children (the stat items)
                if (p.children.length >= 4) { target = p; break; }
              }
              break;
            }
          }
          if (target && target.nextSibling) {
            target.parentElement.insertBefore(el, target.nextSibling);
          } else {
            root.appendChild(el);
          }

          // Wire up form
          var apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? '' : 'https://sgnmqxb2sw.us-east-1.awsapprunner.com';
          document.getElementById('growth-email-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.getElementById('growth-email-btn');
            var msg = document.getElementById('growth-email-msg');
            var inp = document.getElementById('growth-email-input');
            var email = inp.value.trim();
            if (!email) return;
            btn.disabled = true; btn.textContent = 'Subscribing...'; btn.style.opacity = '0.6';
            msg.innerHTML = '';
            fetch(apiBase + '/api/growth/subscribe', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: email, source: 'website_main', platform: 'landing_page' })
            })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
              if (res.data.success) {
                msg.innerHTML = '<span style="color:#3fb950">\u2713 You\u2019re in! Check your inbox soon.</span>';
                inp.value = '';
              } else if (res.data.duplicate) {
                msg.innerHTML = '<span style="color:#d29922">You\u2019re already subscribed \u2014 thanks!</span>';
              } else {
                msg.innerHTML = '<span style="color:#f85149">' + (res.data.error || 'Something went wrong.') + '</span>';
              }
            })
            .catch(function() { msg.innerHTML = '<span style="color:#f85149">Network error. Please try again.</span>'; })
            .finally(function() { btn.disabled = false; btn.textContent = 'Subscribe'; btn.style.opacity = '1'; });
          });
        }
        var obs = new MutationObserver(inject);
        obs.observe(document.body, { childList: true, subtree: true });
        var iv = setInterval(function() { inject(); if (done) { clearInterval(iv); obs.disconnect(); } }, 400);
        setTimeout(function() { obs.disconnect(); clearInterval(iv); }, 30000);
      })();
    </script>
    <!-- Standalone email capture fallback — loads if injection didn't work -->
    <script src="/assets/growth-email-capture.js"></script>
  </body>
