<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AISEO Master - AI-First SEO Platform</title>
    <script type="module" crossorigin src="/assets/index-Bfah4_p8.js"></script>
    <script>
      // Intercept ALL navigation to /audit/ and force full page reload with all categories
      (function() {
        // Intercept history.pushState
        const originalPushState = history.pushState;
        history.pushState = function(state, title, url) {
          if (url && url.includes('/audit/')) {
            const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
            let newUrl = url;
            if (url.includes('?cats=')) {
              newUrl = url.replace(/\?cats=[^&]*/, '?cats=' + allCats);
            } else if (url.includes('?')) {
              newUrl = url + '&cats=' + allCats;
            } else {
              newUrl = url + '?cats=' + allCats;
            }
            window.location.href = newUrl;
            return;
          }
          return originalPushState.apply(this, arguments);
        };

        // Intercept history.replaceState
        const originalReplaceState = history.replaceState;
        history.replaceState = function(state, title, url) {
          if (url && url.includes('/audit/')) {
            const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
            let newUrl = url;
            if (url.includes('?cats=')) {
              newUrl = url.replace(/\?cats=[^&]*/, '?cats=' + allCats);
            } else if (url.includes('?')) {
              newUrl = url + '&cats=' + allCats;
            } else {
              newUrl = url + '?cats=' + allCats;
            }
            window.location.href = newUrl;
            return;
          }
          return originalReplaceState.apply(this, arguments);
        };

        // Intercept clicks on links
        document.addEventListener('click', function(e) {
          const target = e.target.closest('a, button');
          if (target) {
            const href = target.getAttribute('href') || target.getAttribute('data-href') || '';
            if (href.includes('/audit/')) {
              e.preventDefault();
              e.stopPropagation();
              const allCats = 'technical,onpage,content,mobile,performance,security,social,local,geo';
              let newUrl = href;
              if (href.includes('?cats=')) {
                newUrl = href.replace(/\?cats=[^&]*/, '?cats=' + allCats);
              } else if (href.includes('?')) {
                newUrl = href + '&cats=' + allCats;
              } else {
                newUrl = href + '?cats=' + allCats;
              }
              window.location.href = newUrl;
            }
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Inject GEO Scanner Agent card into the React dashboard
      (function() {
        var injected = false;
        var observer = new MutationObserver(function() {
          if (injected) return;
          // Only inject on dashboard pages
          if (!location.pathname.includes('dashboard')) return;
          // Find the card grid — look for the section with "AI SEARCH OPTIMIZATION" or similar card containers
          var cards = document.querySelectorAll('[class*="MuiCard"], [class*="card"], [class*="Card"]');
          if (cards.length < 2) return;
          // Find the parent grid container
          var grid = cards[0].parentElement;
          if (!grid) return;
          // Check if we already injected
          if (document.getElementById('geo-scanner-card')) return;
          injected = true;

          var card = document.createElement('div');
          card.id = 'geo-scanner-card';
          card.style.cssText = 'background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);border:2px solid #238636;border-radius:16px;padding:24px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;';
          card.onmouseover = function(){ card.style.borderColor='#3fb950'; card.style.transform='translateY(-2px)'; card.style.boxShadow='0 4px 20px rgba(35,134,54,0.3)'; };
          card.onmouseout = function(){ card.style.borderColor='#238636'; card.style.transform='none'; card.style.boxShadow='none'; };
          card.onclick = function(){ window.location.href='/geo-scanner'; };
          card.innerHTML = '<div style="font-size:1.8rem;margin-bottom:8px">🔬</div>'
            + '<div style="font-size:1rem;font-weight:700;color:#e1e4e8;margin-bottom:4px">GEO Scanner Agent</div>'
            + '<div style="font-size:0.82rem;color:#8b949e;line-height:1.5;margin-bottom:12px">Full AI visibility scan — runs 4 scanner agents across AI models. Get a plain-English report with scores, recommendations, and RDS tracking.</div>'
            + '<span style="display:inline-block;padding:3px 10px;background:#238636;color:#fff;border-radius:6px;font-size:0.72rem;font-weight:600">NEW — Scanner Agent</span>';

          // Insert as the first card in the grid
          grid.insertBefore(card, grid.firstChild);
        });
        observer.observe(document.body, { childList: true, subtree: true });
        // Stop observing after 30s to avoid memory leaks
        setTimeout(function(){ observer.disconnect(); }, 30000);
      })();
    </script>
  </body>
</html>
