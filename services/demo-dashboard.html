<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI1STSEO — Growth Engine Demo</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #131829;
    --surface2: #1a2035;
    --border: #252d44;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #3b82f6;
    --accent2: #8b5cf6;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --pink: #ec4899;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1040 0%, #0f1629 50%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .badge {
    background: var(--green);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 24px; }

  /* Metric Cards Row */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s;
  }
  .metric-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .metric-card .value {
    font-size: 36px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .metric-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; }
  .color-blue { color: var(--accent); }
  .color-green { color: var(--green); }
  .color-purple { color: var(--accent2); }
  .color-orange { color: var(--orange); }
  .color-pink { color: var(--pink); }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .section-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
  }
  .section-header .icon { font-size: 18px; }
  .section-header h2 { font-size: 16px; font-weight: 600; }
  .section-header .tag {
    margin-left: auto;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 6px;
    font-weight: 600;
  }
  .tag-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-blue { background: rgba(59,130,246,0.15); color: var(--accent); }
  .tag-purple { background: rgba(139,92,246,0.15); color: var(--accent2); }
  .section-body { padding: 24px; }

  /* SEO Score Ring */
  .score-ring-container { display: flex; align-items: center; gap: 32px; }
  .score-ring {
    width: 120px; height: 120px;
    position: relative;
    flex-shrink: 0;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .score-ring .fg { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-ring .score-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px; font-weight: 800;
  }
  .score-ring .grade {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px; color: var(--text2); font-weight: 600;
  }
  .score-details { flex: 1; }
  .score-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .score-bar-label { width: 90px; font-size: 13px; color: var(--text2); }
  .score-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .score-bar-value { width: 50px; font-size: 13px; font-weight: 600; text-align: right; }

  /* Blog Preview */
  .blog-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .blog-meta { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .blog-meta span {
    font-size: 12px; color: var(--text2);
    background: var(--surface2); padding: 4px 10px; border-radius: 6px;
  }
  .blog-snippet {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 16px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
  }
  .blog-snippet strong { color: var(--text); }
  .content-preview { font-size: 14px; color: var(--text2); line-height: 1.7; }
  .content-preview p { margin-bottom: 10px; }

  /* Social Posts */
  .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 768px) { .social-grid { grid-template-columns: 1fr; } }
  .social-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .social-card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 14px;
  }
  .social-card-body {
    padding: 16px;
    font-size: 13px;
    color: var(--text2);
    white-space: pre-wrap;
    line-height: 1.6;
    max-height: 320px;
    overflow-y: auto;
  }
  .social-card-body::-webkit-scrollbar { width: 4px; }
  .social-card-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Tweet thread */
  .tweet {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .tweet:last-child { margin-bottom: 0; }
  .tweet-num { color: var(--accent); font-weight: 700; }

  /* Engagement Bar Chart */
  .eng-chart { display: flex; align-items: flex-end; gap: 16px; height: 140px; padding-top: 10px; }
  .eng-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .eng-bar {
    width: 48px;
    border-radius: 6px 6px 0 0;
    transition: height 1s ease;
    min-height: 4px;
  }
  .eng-bar-label { font-size: 11px; color: var(--text2); }
  .eng-bar-value { font-size: 13px; font-weight: 700; }

  /* Event breakdown */
  .event-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .event-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .event-item .name { font-size: 12px; color: var(--text2); }
  .event-item .count { font-size: 18px; font-weight: 700; }

  /* FAQ */
  .faq-item { margin-bottom: 14px; }
  .faq-q { font-weight: 600; font-size: 14px; margin-bottom: 4px; color: var(--accent); }
  .faq-a { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 60vh; font-size: 16px; color: var(--text2);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--text2);
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>AI1STSEO Growth Engine</h1>
  <span class="badge">Live Demo</span>
</div>

<div class="container" id="app">
  <div class="loading" id="loader">
    <div class="spinner"></div>
    Loading demo data...
  </div>
</div>

<script>
const API_URL = '/api/demo-output';

async function loadDemo() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('loader').innerHTML = `<p style="color:var(--red)">Failed to load: ${e.message}</p>`;
  }
}

function render(data) {
  const app = document.getElementById('app');
  const b = data.blog || {};
  const s = data.social || {};
  const m = data.metrics || {};
  const bd = m.event_breakdown || {};
  const score = b.seo_score || 0;
  const grade = b.seo_grade || '-';

  app.innerHTML = `
    <!-- Metrics Row -->
    <div class="metrics-row">
      <div class="metric-card">
        <div class="value color-blue">${score}</div>
        <div class="label">SEO Score</div>
      </div>
      <div class="metric-card">
        <div class="value color-green">${m.total_posts || 0}</div>
        <div class="label">Posts Created</div>
      </div>
      <div class="metric-card">
        <div class="value color-purple">${m.total_engagement || 0}</div>
        <div class="label">Total Engagement</div>
      </div>
      <div class="metric-card">
        <div class="value color-orange">${m.avg_engagement || 0}</div>
        <div class="label">Avg Engagement</div>
      </div>
      <div class="metric-card">
        <div class="value color-pink">${m.analytics_events || 0}</div>
        <div class="label">Analytics Events</div>
      </div>
    </div>

    <!-- SEO Score -->
    <div class="section">
      <div class="section-header">
        <span class="icon">🎯</span>
        <h2>SEO Performance</h2>
        <span class="tag tag-green">Grade: ${grade}</span>
      </div>
      <div class="section-body">
        <div class="score-ring-container">
          <div class="score-ring">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle class="bg" cx="60" cy="60" r="50"/>
              <circle class="fg" cx="60" cy="60" r="50"
                stroke="${scoreColor(score)}"
                stroke-dasharray="${Math.PI * 100}"
                stroke-dashoffset="${Math.PI * 100 * (1 - score / 100)}"/>
            </svg>
            <div class="score-text" style="color:${scoreColor(score)}">${score}</div>
          </div>
          <div class="score-details">
            ${scoreBar('Keyword', 85, 'var(--accent)')}
            ${scoreBar('Structure', 83, 'var(--accent2)')}
            ${scoreBar('Readability', 90, 'var(--green)')}
          </div>
        </div>
      </div>
    </div>

    <!-- Blog Preview -->
    <div class="section">
      <div class="section-header">
        <span class="icon">📝</span>
        <h2>Generated Blog</h2>
        <span class="tag tag-blue">${b.faq_count || 0} FAQs · ${b.internal_links || 0} Links</span>
      </div>
      <div class="section-body">
        <div class="blog-title">${esc(b.title || 'No blog generated')}</div>
        <div class="blog-meta">
          <span>📌 ${esc(b.meta_title || '')}</span>
          <span>📋 ${esc(b.meta_description || '')}</span>
        </div>
        ${b.snippet ? `<div class="blog-snippet"><strong>Featured Snippet:</strong> ${esc(b.snippet)}</div>` : ''}
        <div class="content-preview">
          ${(b.content_preview || []).map(p => `<p>${esc(p)}</p>`).join('')}
        </div>
      </div>
    </div>

    <!-- Social Posts -->
    <div class="section">
      <div class="section-header">
        <span class="icon">📣</span>
        <h2>Social Content</h2>
        <span class="tag tag-purple">Ready to Post</span>
      </div>
      <div class="section-body">
        <div class="social-grid">
          <div class="social-card">
            <div class="social-card-header">🔗 LinkedIn Post</div>
            <div class="social-card-body">${esc(s.linkedin_post || 'No post generated')}</div>
          </div>
          <div class="social-card">
            <div class="social-card-header">🐦 Twitter/X Thread</div>
            <div class="social-card-body">
              ${(s.twitter_thread || []).map((t, i) =>
                `<div class="tweet"><span class="tweet-num">${i + 1}/</span> ${esc(t)}</div>`
              ).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Engagement -->
    <div class="section">
      <div class="section-header">
        <span class="icon">📊</span>
        <h2>Engagement Metrics</h2>
        <span class="tag tag-green">${m.engagement_entries || 0} entries</span>
      </div>
      <div class="section-body">
        <div class="eng-chart">
          ${engBar('Posts', m.total_posts, 'var(--accent)', m.total_posts)}
          ${engBar('Published', m.published, 'var(--green)', m.total_posts)}
          ${engBar('Queued', m.queued, 'var(--orange)', m.total_posts)}
          ${engBar('Engagement', m.total_engagement, 'var(--accent2)', m.total_engagement)}
          ${engBar('Avg/Post', m.avg_engagement, 'var(--pink)', m.total_engagement)}
        </div>
      </div>
    </div>

    <!-- Event Breakdown -->
    <div class="section">
      <div class="section-header">
        <span class="icon">⚡</span>
        <h2>Analytics Events</h2>
        <span class="tag tag-blue">${m.analytics_events || 0} total</span>
      </div>
      <div class="section-body">
        <div class="event-grid">
          ${Object.entries(bd).map(([k, v]) => `
            <div class="event-item">
              <span class="name">${esc(k.replace(/_/g, ' '))}</span>
              <span class="count color-blue">${v}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="footer">
      AI1STSEO Growth Engine · Generated ${new Date(data.generated_at).toLocaleString()} · Demo Mode
    </div>
  `;
}

function scoreColor(s) {
  if (s >= 80) return 'var(--green)';
  if (s >= 60) return 'var(--orange)';
  return 'var(--red)';
}

function scoreBar(label, pct, color) {
  return `<div class="score-bar-row">
    <span class="score-bar-label">${label}</span>
    <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="score-bar-value" style="color:${color}">${pct}%</span>
  </div>`;
}

function engBar(label, val, color, max) {
  const h = max > 0 ? Math.max(8, (val / max) * 120) : 8;
  return `<div class="eng-bar-group">
    <span class="eng-bar-value" style="color:${color}">${val}</span>
    <div class="eng-bar" style="height:${h}px;background:${color}"></div>
    <span class="eng-bar-label">${label}</span>
  </div>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

loadDemo();
</script>
</body>
</html>
