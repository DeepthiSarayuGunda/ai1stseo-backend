<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI1stSEO Sports Directory</title>
    <link rel="stylesheet" href="a11y-sports.css?v=2">
    <style>
        :root{--bg:#050510;--text:#fff;--muted:rgba(255,255,255,.55);--faint:rgba(255,255,255,.25);--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--accent:#00d4ff;--green:#00ff88;--purple:#7b2cbf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        a{color:var(--accent);text-decoration:none}
        nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:rgba(5,5,16,.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
        .nav-logo{font-size:1.3rem;font-weight:700;background:linear-gradient(90deg,#00d4ff,#7b2cbf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .nav-links{display:flex;gap:20px;align-items:center}
        .nav-links a{color:var(--muted);font-size:.85rem}
        .nav-links a:hover{color:var(--text)}
        .breadcrumb{padding:12px 32px;font-size:.8rem;color:var(--faint);border-bottom:1px solid var(--border)}
        .breadcrumb a{color:var(--muted)}
        .container{max-width:1200px;margin:0 auto;padding:32px 24px}
        .sport-header{display:flex;align-items:center;gap:20px;margin-bottom:32px;flex-wrap:wrap}
        .sport-header .icon{font-size:3.5rem}
        .sport-header h1{font-size:2rem;font-weight:800}
        .sport-header p{color:var(--muted);font-size:.95rem;max-width:600px;line-height:1.6}
        .sub-tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:12px}
        .sub-tab{padding:8px 18px;border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s}
        .sub-tab:hover{color:var(--text);background:rgba(255,255,255,.04)}
        .sub-tab.active{background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(123,44,191,.12));color:var(--accent)}
        .section-title{font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--faint);font-weight:600;margin:28px 0 14px}
        .panel{display:none}
        .panel.active{display:block}
        .match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
        .match-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .2s;cursor:pointer}
        .match-card:hover{border-color:rgba(0,212,255,.15);transform:translateY(-2px)}
        .match-teams{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .match-team{font-size:.9rem;font-weight:600}
        .match-vs{font-size:.7rem;color:var(--faint);padding:0 8px}
        .match-meta{font-size:.75rem;color:var(--faint);display:flex;justify-content:space-between}
        .match-status{font-size:.7rem;padding:2px 8px;border-radius:6px;font-weight:600}
        .live{background:rgba(239,68,68,.15);color:#ef4444}
        .upcoming{background:rgba(0,212,255,.12);color:#00d4ff}
        .completed{background:rgba(0,255,136,.12);color:#00ff88}
        .news-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
        .news-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .2s;cursor:pointer}
        .news-card:hover{border-color:rgba(0,212,255,.15);transform:translateY(-2px)}
        .news-card h4{font-size:.9rem;font-weight:600;margin-bottom:6px;line-height:1.4}
        .news-card p{font-size:.78rem;color:var(--muted);line-height:1.5}
        .news-card .meta{font-size:.7rem;color:var(--faint);margin-top:8px}
        .rank-table{width:100%;border-collapse:collapse}
        .rank-table th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--faint);padding:10px 14px;border-bottom:1px solid var(--border)}
        .rank-table td{padding:10px 14px;font-size:.85rem;border-bottom:1px solid var(--border);color:var(--muted)}
        .rank-table tr:hover{background:rgba(255,255,255,.02)}
        .rank-num{font-weight:700;color:var(--accent)}
        .trend-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
        .trend-pill{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s}
        .trend-pill:hover{border-color:rgba(0,255,136,.15);background:rgba(255,255,255,.03)}
        .trend-pill .num{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#00ff88,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;min-width:24px}
        .trend-pill .label{font-size:.82rem;font-weight:500}
        .link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
        .link-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:.85rem;font-weight:500;transition:all .2s;display:block}
        .link-card:hover{border-color:var(--accent);color:var(--text);background:rgba(0,212,255,.04)}
        .link-card span{font-size:.72rem;color:var(--faint);display:block;margin-top:4px;font-weight:400}
        footer{border-top:1px solid var(--border);padding:40px 24px 28px;margin-top:60px;text-align:center;color:var(--faint);font-size:.8rem}
        @media(max-width:768px){.sport-header h1{font-size:1.5rem}.match-grid,.news-list{grid-template-columns:1fr}nav{padding:12px 16px}.nav-links a:not(:last-child){display:none}}
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">&#x1F50D; AI1stSEO</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/directory-sports.html">Sports Hub</a>
            <a href="/directory-home.html">Directory</a>
            
        </div>
    </nav>
    <div class="breadcrumb"><a href="/">Home</a> &rsaquo; <a href="/directory-sports.html">Sports</a> &rsaquo; <span id="breadSport">Loading...</span></div>
    <div class="container">
        <div class="sport-header">
            <span class="icon" id="sportIcon"></span>
            <div>
                <h1 id="sportName">Loading...</h1>
                <p id="sportDesc"></p>
            </div>
        </div>
        <div class="sub-tabs" id="subTabs"></div>
        <div class="panel active" id="panel-matches">
            <div class="section-title">&#x1F3DF; Matches &amp; Scores</div>
            <div class="match-grid" id="matchGrid"></div>
        </div>
        <div class="panel" id="panel-news">
            <div class="section-title">&#x1F4F0; Latest News</div>
            <div class="news-list" id="newsList"></div>
        </div>
        <div class="panel" id="panel-rankings">
            <div class="section-title">&#x1F3C6; Rankings</div>
            <div style="overflow-x:auto;"><table class="rank-table" id="rankTable"></table></div>
        </div>
        <div class="panel" id="panel-trending">
            <div class="section-title">&#x1F525; Trending Topics</div>
            <div class="trend-list" id="trendList"></div>
        </div>
        <div class="section-title" style="margin-top:40px;">&#x1F517; Explore More</div>
        <div class="link-grid" id="linkGrid"></div>
    </div>
    <footer>&copy; 2026 AI1stSEO Sports Directory. <a href="/directory-sports.html">Back to Sports Hub</a> &middot; <a href="/">AI1stSEO Home</a></footer>
    <script>
    var sportsData = {
        cricket: {
            icon:'&#x1F3CF;',name:'Cricket',
            desc:'The world\'s second most popular sport with 2.5 billion fans. Governed by the ICC, featuring formats from T20 to Test matches across 100+ countries.',
            matches:[
                {t1:'India',t2:'Australia',comp:'IPL 2026',date:'Apr 18',status:'live',score:'182/4 (16.2)'},
                {t1:'England',t2:'South Africa',comp:'T20 World Cup',date:'Apr 20',status:'upcoming',score:''},
                {t1:'Mumbai Indians',t2:'Chennai Super Kings',comp:'IPL 2026',date:'Apr 16',status:'completed',score:'MI 175/6 - CSK 172/8'},
                {t1:'Pakistan',t2:'New Zealand',comp:'ODI Series',date:'Apr 22',status:'upcoming',score:''},
                {t1:'RCB',t2:'KKR',comp:'IPL 2026',date:'Apr 17',status:'live',score:'94/2 (11.0)'},
                {t1:'West Indies',t2:'Sri Lanka',comp:'Test Series',date:'Apr 15',status:'completed',score:'WI 342 & 198 - SL 287 & 250'}
            ],
            news:[
                {title:'IPL 2026: Virat Kohli smashes century in record chase',desc:'RCB captain hits 103 off 58 balls as team chases down 210 with 3 balls to spare.',time:'2h ago'},
                {title:'ICC announces new T20 World Cup format for 2026',desc:'20 teams to compete in expanded format with group stage and Super 8s.',time:'5h ago'},
                {title:'Australia announce squad for India tour',desc:'Pat Cummins returns from injury to lead 15-man squad for 5-match Test series.',time:'1d ago'},
                {title:'IPL auction: Record $2.5M bid for uncapped player',desc:'18-year-old left-arm pacer fetches highest-ever bid for an uncapped Indian player.',time:'2d ago'}
            ],
            rankings:[
                {rank:1,name:'India',rating:121,prev:1},{rank:2,name:'Australia',rating:116,prev:2},
                {rank:3,name:'England',rating:112,prev:4},{rank:4,name:'South Africa',rating:110,prev:3},
                {rank:5,name:'New Zealand',rating:105,prev:5},{rank:6,name:'Pakistan',rating:98,prev:7},
                {rank:7,name:'Sri Lanka',rating:95,prev:6},{rank:8,name:'West Indies',rating:88,prev:8}
            ],
            trending:['IPL 2026 live score','T20 World Cup schedule','Virat Kohli stats','IPL points table','India vs Australia','Cricket World Cup 2027','Best cricket bats 2026','IPL fantasy team'],
            links:[
                {text:'IPL 2026 Schedule',sub:'Full match calendar'},
                {text:'T20 World Cup Teams',sub:'All 20 qualified teams'},
                {text:'ICC Test Rankings',sub:'Latest team rankings'},
                {text:'Cricket Stats & Records',sub:'All-time records'},
                {text:'Fantasy Cricket Tips',sub:'IPL fantasy picks'},
                {text:'Cricket Equipment Guide',sub:'Bats, pads, gear reviews'}
            ]
        },
        football: {
            icon:'&#x26BD;',name:'Football',
            desc:'The world\'s most popular sport with 4 billion fans. From the FIFA World Cup to the English Premier League, football unites the globe.',
            matches:[
                {t1:'Manchester City',t2:'Arsenal',comp:'Premier League',date:'Apr 18',status:'upcoming',score:''},
                {t1:'Real Madrid',t2:'Bayern Munich',comp:'Champions League',date:'Apr 17',status:'live',score:'2-1 (72\')'},
                {t1:'Barcelona',t2:'PSG',comp:'Champions League',date:'Apr 16',status:'completed',score:'3-2'},
                {t1:'Liverpool',t2:'Chelsea',comp:'Premier League',date:'Apr 15',status:'completed',score:'2-0'},
                {t1:'Brazil',t2:'Argentina',comp:'World Cup Qualifier',date:'Apr 22',status:'upcoming',score:''},
                {t1:'Inter Milan',t2:'Juventus',comp:'Serie A',date:'Apr 19',status:'upcoming',score:''}
            ],
            news:[
                {title:'Champions League: Real Madrid edge past Bayern in thriller',desc:'Vinicius Jr scores late winner as Real Madrid advance to semi-finals.',time:'3h ago'},
                {title:'FIFA World Cup 2026: Host cities confirmed',desc:'16 cities across USA, Canada, and Mexico to host 104 matches.',time:'8h ago'},
                {title:'Premier League title race: City vs Arsenal goes to final day',desc:'Both teams level on points with 2 matches remaining.',time:'1d ago'},
                {title:'Mbappe breaks Champions League scoring record',desc:'PSG star surpasses Ronaldo\'s group stage goal tally.',time:'2d ago'}
            ],
            rankings:[
                {rank:1,name:'Argentina',rating:1886,prev:1},{rank:2,name:'France',rating:1860,prev:2},
                {rank:3,name:'Brazil',rating:1841,prev:3},{rank:4,name:'England',rating:1798,prev:4},
                {rank:5,name:'Belgium',rating:1782,prev:5},{rank:6,name:'Spain',rating:1770,prev:7},
                {rank:7,name:'Germany',rating:1756,prev:6},{rank:8,name:'Portugal',rating:1742,prev:8}
            ],
            trending:['EPL standings 2026','Champions League results','FIFA World Cup 2026','Transfer rumors','Ballon d\'Or 2026','Premier League top scorers','La Liga table','MLS schedule'],
            links:[
                {text:'Premier League Table',sub:'Current standings'},{text:'Champions League Bracket',sub:'Knockout stage draw'},
                {text:'FIFA World Cup 2026 Guide',sub:'Schedule, teams, venues'},{text:'Transfer Window Tracker',sub:'Latest signings'},
                {text:'Fantasy Premier League',sub:'FPL tips & picks'},{text:'Football Boots Guide',sub:'Best cleats 2026'}
            ]
        }
    };

    // Default/fallback for sports without full data
    var defaultData = {
        matches:[{t1:'Team A',t2:'Team B',comp:'Championship',date:'TBD',status:'upcoming',score:''}],
        news:[{title:'Stay tuned for the latest updates',desc:'We\'re building out this sport\'s coverage. Check back soon for news, scores, and rankings.',time:'Just now'}],
        rankings:[{rank:1,name:'Coming soon',rating:'-',prev:'-'}],
        trending:['Live scores','Schedule 2026','Rankings','News','Highlights','Stats','Tickets','Fantasy'],
        links:[{text:'Back to Sports Hub',sub:'Browse all sports'}]
    };

    var sportsMeta = {
        cricket:{icon:'&#x1F3CF;',name:'Cricket',desc:'The world\'s second most popular sport.'},
        football:{icon:'&#x26BD;',name:'Football',desc:'The world\'s most popular sport.'},
        basketball:{icon:'&#x1F3C0;',name:'Basketball',desc:'Fast-paced court sport with global reach.'},
        tennis:{icon:'&#x1F3BE;',name:'Tennis',desc:'Individual and doubles racket sport.'},
        baseball:{icon:'&#x26BE;',name:'Baseball',desc:'America\'s pastime, popular across Asia and Americas.'},
        hockey:{icon:'&#x1F3D2;',name:'Ice Hockey',desc:'Fast, physical team sport on ice.'},
        golf:{icon:'&#x26F3;',name:'Golf',desc:'Precision club-and-ball sport played worldwide.'},
        rugby:{icon:'&#x1F3C9;',name:'Rugby',desc:'Full-contact team sport with global following.'},
        boxing:{icon:'&#x1F94A;',name:'Boxing',desc:'Combat sport with rich history and global appeal.'},
        f1:{icon:'&#x1F3CE;',name:'Formula 1',desc:'The pinnacle of motorsport racing.'},
        swimming:{icon:'&#x1F3CA;',name:'Swimming',desc:'Aquatic sport featured in every Olympics.'},
        athletics:{icon:'&#x1F3C3;',name:'Athletics',desc:'Track and field — the foundation of the Olympics.'},
        volleyball:{icon:'&#x1F3D0;',name:'Volleyball',desc:'Team sport played indoor and on the beach.'},
        cycling:{icon:'&#x1F6B4;',name:'Cycling',desc:'Road, track, and mountain biking competitions.'},
        esports:{icon:'&#x1F3AE;',name:'Esports',desc:'Competitive video gaming with massive global audience.'},
        mma:{icon:'&#x1F94B;',name:'MMA',desc:'Mixed martial arts — UFC, Bellator, ONE Championship.'}
    };

    var params = new URLSearchParams(window.location.search);
    var sportId = params.get('sport') || 'cricket';
    var data = sportsData[sportId] || null;
    var meta = sportsMeta[sportId] || {icon:'&#x1F3C6;',name:sportId,desc:''};

    if (!data) {
        data = Object.assign({}, defaultData);
        data.icon = meta.icon; data.name = meta.name; data.desc = meta.desc;
    }

    document.title = 'AI1stSEO Sports — ' + meta.name;
    document.getElementById('breadSport').textContent = meta.name;
    document.getElementById('sportIcon').innerHTML = data.icon || meta.icon;
    document.getElementById('sportName').textContent = data.name || meta.name;
    document.getElementById('sportDesc').textContent = data.desc || meta.desc;

    // Tabs
    var tabs = ['matches','news','rankings','trending'];
    var tabLabels = {'matches':'&#x1F3DF; Matches','news':'&#x1F4F0; News','rankings':'&#x1F3C6; Rankings','trending':'&#x1F525; Trending'};
    var activeTab = 'matches';
    function renderTabs() {
        var html = '';
        tabs.forEach(function(t) {
            html += '<button class="sub-tab' + (t===activeTab?' active':'') + '" onclick="switchTab(\'' + t + '\')">' + tabLabels[t] + '</button>';
        });
        document.getElementById('subTabs').innerHTML = html;
    }
    function switchTab(t) {
        activeTab = t;
        renderTabs();
        tabs.forEach(function(tab) {
            document.getElementById('panel-' + tab).className = tab === t ? 'panel active' : 'panel';
        });
    }
    renderTabs();

    // Matches
    var mhtml = '';
    data.matches.forEach(function(m) {
        var statusClass = m.status === 'live' ? 'live' : m.status === 'completed' ? 'completed' : 'upcoming';
        var statusText = m.status === 'live' ? '&#x1F534; LIVE' : m.status === 'completed' ? '&#x2705; Final' : '&#x1F551; ' + m.date;
        mhtml += '<div class="match-card"><div class="match-teams"><span class="match-team">' + m.t1 + '</span><span class="match-vs">vs</span><span class="match-team">' + m.t2 + '</span></div>';
        mhtml += '<div class="match-meta"><span>' + m.comp + '</span><span class="match-status ' + statusClass + '">' + statusText + '</span></div>';
        if (m.score) mhtml += '<div style="margin-top:8px;font-size:.8rem;color:var(--accent);font-weight:500;">' + m.score + '</div>';
        mhtml += '</div>';
    });
    document.getElementById('matchGrid').innerHTML = mhtml;

    // News
    var nhtml = '';
    data.news.forEach(function(n) {
        nhtml += '<div class="news-card"><h4>' + n.title + '</h4><p>' + n.desc + '</p><div class="meta">' + n.time + '</div></div>';
    });
    document.getElementById('newsList').innerHTML = nhtml;

    // Rankings
    var rhtml = '<thead><tr><th>#</th><th>Team</th><th>Rating</th><th>Prev</th></tr></thead><tbody>';
    data.rankings.forEach(function(r) {
        rhtml += '<tr><td class="rank-num">' + r.rank + '</td><td>' + r.name + '</td><td>' + r.rating + '</td><td style="color:var(--faint);">' + r.prev + '</td></tr>';
    });
    rhtml += '</tbody>';
    document.getElementById('rankTable').innerHTML = rhtml;

    // Trending
    var thtml = '';
    data.trending.forEach(function(t, i) {
        thtml += '<div class="trend-pill"><span class="num">' + (i+1) + '</span><span class="label">' + t + '</span></div>';
    });
    document.getElementById('trendList').innerHTML = thtml;

    // Internal links
    var lhtml = '';
    data.links.forEach(function(l) {
        lhtml += '<a href="/directory-sport.html?sport=' + sportId + '&section=' + encodeURIComponent(l.text) + '" class="link-card">' + l.text + '<span>' + l.sub + '</span></a>';
    });
    // Add cross-sport links
    Object.keys(sportsMeta).forEach(function(sid) {
        if (sid !== sportId) {
            lhtml += '<a href="/directory-sport.html?sport=' + sid + '" class="link-card">' + sportsMeta[sid].name + '<span>Explore ' + sportsMeta[sid].name + '</span></a>';
        }
    });
    document.getElementById('linkGrid').innerHTML = lhtml;
    </script>
<script src="a11y-sports.js?v=2"></script>
</body>
</html>
